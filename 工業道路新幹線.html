<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小6社会 04 都市と交通｜地図で覚える</title>
<style>
  :root{
    --ink:#16233D; --paper:#EEF1F4; --line:#D8DDE5; --muted:#5A6478; --pale:#98A0B0;
    --city:#E4572E; --road:#1F8A4C; --rail:#0B63B0;
    --sea:#DCE8F0; --land:#FBFAF6; --border:#B9C4CF;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;-webkit-text-size-adjust:100%;}
  .wrap{max-width:480px;margin:0 auto;padding:20px 14px 40px;}
  .hidden{display:none !important;}
  button{font-family:inherit;cursor:pointer;}
  button:focus-visible{outline:3px solid var(--rail);outline-offset:2px;}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--pale);margin-bottom:4px;}
  h1{font-size:29px;font-weight:800;margin:0;letter-spacing:1px;}
  .sub{color:var(--muted);font-size:14.5px;margin:6px 0 0;line-height:1.5;}
  .seclabel{font-size:12px;font-weight:700;color:var(--pale);letter-spacing:1px;margin:20px 0 9px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .card{display:flex;flex-direction:column;gap:3px;align-items:center;padding:15px 10px;
    border-radius:14px;border:2px solid var(--line);background:#fff;color:var(--ink);transition:all .15s;}
  .card.left{align-items:flex-start;text-align:left;}
  .card .n{font-size:15.5px;font-weight:700;}
  .card .s{font-size:11.5px;opacity:.8;}
  .btn-primary{width:100%;padding:15px;font-size:17px;font-weight:700;color:#fff;background:var(--rail);
    border:none;border-radius:12px;}
  .btn-dark{background:var(--ink);}
  .btn-ghost{padding:13px;font-size:14.5px;font-weight:600;color:var(--muted);background:#fff;
    border:1px solid var(--line);border-radius:12px;}
  .btn-grade{flex:1;padding:15px;font-size:16px;font-weight:700;background:#fff;border:2px solid;border-radius:12px;}
  .btn-choice{padding:14px;font-size:16.5px;font-weight:700;border:2px solid var(--line);background:#fff;
    border-radius:12px;width:100%;transition:all .15s;}
  .row{display:flex;gap:9px;} .col{display:flex;flex-direction:column;gap:9px;}
  .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;}

  /* ── 地図 ── */
  #mapbox{position:relative;background:var(--sea);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;box-shadow:0 6px 20px rgba(22,35,61,.08);}
  #map{display:block;width:100%;height:auto;}
  #vp{transition:transform .55s cubic-bezier(.4,0,.2,1);}
  .land{fill:var(--land);stroke:var(--border);stroke-width:1.1;stroke-linejoin:round;}
  .dot-o{fill:#B9C4CF;}
  .route-o{fill:none;stroke:#C3CDD8;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;}
  .route-hi{fill:none;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;}
  #zoomtog{position:absolute;right:10px;bottom:10px;background:rgba(255,255,255,.94);
    border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:700;color:var(--muted);}
  #legend{position:absolute;left:10px;top:10px;background:rgba(255,255,255,.88);border-radius:8px;
    padding:5px 9px;font-size:11px;color:var(--muted);font-weight:600;}
  @keyframes ping{0%{r:9;opacity:.85}70%{r:34;opacity:0}100%{r:34;opacity:0}}
  #ping{animation:ping 1.7s ease-out infinite;}
  @media (prefers-reduced-motion: reduce){#ping{animation:none;opacity:.35}#vp{transition:none}}

  /* ── 問題 ── */
  #qbar{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px;}
  #qcard{background:#fff;border:1px solid #E3E6EC;border-radius:16px;padding:18px 18px 20px;text-align:center;}
  #qask{font-size:16.5px;font-weight:700;}
  #qhint{margin-top:8px;font-size:14px;line-height:1.6;color:var(--muted);}
  #answer{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);}
  #ansmain{font-size:28px;font-weight:800;}
  #ansmain .unit{font-size:17px;color:var(--ink);}
  #anspref{font-size:13px;color:var(--muted);margin-top:3px;}
  #score{font-size:62px;font-weight:800;line-height:1;}
  #score span{font-size:25px;color:var(--pale);font-weight:600;}
  #verdict{margin-top:8px;font-size:18px;font-weight:700;}
  .review{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid #E3E6EC;
    border-radius:12px;padding:10px 12px;}
  .review .h{font-size:12.5px;color:var(--muted);}
  /* 進行バー */
  #progress{position:relative;height:20px;margin-bottom:6px;}
  #track{position:absolute;top:9px;left:4px;right:4px;height:3px;background:var(--line);border-radius:2px;}
  #fill{position:absolute;top:9px;left:4px;height:3px;border-radius:2px;transition:width .3s;}
  .stop{position:absolute;top:6px;width:7px;height:7px;border-radius:50%;background:var(--line);}
  .stop.done{background:currentColor;}
  .stop.now{width:11px;height:11px;top:4px;background:#fff;border:3px solid;}
</style>
</head>
<body>
<div class="wrap">

<!-- ══ 設定 ══ -->
<section id="setup">
  <div style="text-align:center">
    <div class="eyebrow" style="color:var(--rail)">小6社会 ・ ポイントチェック 04</div>
    <h1>都市と交通</h1>
    <p class="sub">日本地図の光っている場所を見て、<br>都市名・道路名・終点の駅名を答えよう</p>
  </div>
  <div class="seclabel">ジャンル</div>
  <div class="grid" id="catBtns"></div>
  <div class="seclabel">出題タイプ</div>
  <div class="grid" id="modeBtns"></div>
  <div class="seclabel">地図の見え方</div>
  <div class="grid" id="zoomBtns"></div>
  <button class="btn-primary" style="margin-top:24px" onclick="start()">スタート →</button>
</section>

<!-- ══ クイズ ══ -->
<section id="quiz" class="hidden">
  <div id="progress"><div id="track"></div><div id="fill"></div></div>
  <div id="qbar">
    <span class="tag" id="qcat"></span>
    <span style="font-size:13px;color:var(--pale);font-weight:600" id="qcount"></span>
  </div>

const xy = (lat,lon) => [ (lon*K - MINX)*SC, (-lat - MINY)*SC ];

const COLOR = {'都市':'#E4572E','高速道路':'#1F8A4C','新幹線':'#0B63B0'};

/* ── 都市（緯度・経度つき） ── */
const CITIES = [
 {no:'1-3',  ans:'四日市',     pref:'三重県',   lat:34.965,lon:136.625, hint:'石油化学・四大公害病（四日市ぜんそく）'},
 {no:'1-8',  ans:'堺',         pref:'大阪府',   lat:34.573,lon:135.483, hint:'石油化学・伝統的工芸品の打刃物'},
 {no:'1-12', ans:'明石',       pref:'兵庫県',   lat:34.643,lon:134.997, hint:'日本標準時子午線（東経135度）'},
 {no:'1-14', ans:'奈良',       pref:'奈良県',   lat:34.685,lon:135.805, hint:'伝統的工芸品の筆'},
 {no:'1-20', ans:'倉敷',       pref:'岡山県',   lat:34.585,lon:133.772, hint:'水島コンビナート・瀬戸大橋'},
 {no:'1-30', ans:'山陽小野田', pref:'山口県',   lat:34.001,lon:131.183, hint:'セメント工業'},
 {no:'1-39', ans:'北九州',     pref:'福岡県',   lat:33.883,lon:130.875, hint:'鉄鋼・八幡製鉄所・関門トンネル・関門橋'},
 {no:'1-46', ans:'熊本',       pref:'熊本県',   lat:32.803,lon:130.708, hint:'2016年の地震で大きな被害'},
 {no:'1-51', ans:'鹿児島',     pref:'鹿児島県', lat:31.596,lon:130.557, hint:'九州新幹線の終着駅'},
 {no:'3-6',  ans:'苫小牧',     pref:'北海道',   lat:42.634,lon:141.606, hint:'製紙・石油精製・日本初の掘り込み港'},
 {no:'3-10', ans:'八戸',       pref:'青森県',   lat:40.512,lon:141.488, hint:'漁港・セメント工業'},
 {no:'3-13', ans:'仙台',       pref:'宮城県',   lat:38.268,lon:140.869, hint:'「杜の都」・七夕'},
 {no:'3-33', ans:'太田',       pref:'群馬県',   lat:36.291,lon:139.376, hint:'自動車'},
 {no:'3-37', ans:'銚子',       pref:'千葉県',   lat:35.734,lon:140.827, hint:'漁港・しょう油'},
 {no:'3-40', ans:'君津',       pref:'千葉県',   lat:35.331,lon:139.902, hint:'鉄鋼業'},
 {no:'3-51', ans:'輪島',       pref:'石川県',   lat:37.391,lon:136.899, hint:'2024年の地震で大きな被害・伝統的工芸品の漆器'},
 {no:'3-52', ans:'福井',       pref:'福井県',   lat:36.065,lon:136.222, hint:'化学せんい工業'},
 {no:'3-67', ans:'多治見',     pref:'岐阜県',   lat:35.333,lon:137.132, hint:'陶磁器（焼き物）'},
].map(d=>({...d,cat:'都市',unit:'市',
  ask:'この場所の都市は？', label:`地図${d.no.split('-')[0]}・${d.no.split('-')[1]}番`}));

/* ── 高速道路（おもな経路） ── */
const ROADS = [
 {ans:'東名', unit:'高速道路', mark:'A', hint:'東京〜小牧。太平洋側を通る大動脈',
  line:[[35.68,139.77],[35.44,139.36],[35.31,138.93],[35.10,138.86],[34.97,138.38],[34.77,138.01],[34.71,137.73],[34.83,137.38],[34.95,137.17],[35.15,136.97],[35.29,136.92]]},
 {ans:'九州', unit:'自動車道', mark:'D', hint:'門司〜鹿児島。九州を南北につらぬく',
  line:[[33.94,130.96],[33.86,130.83],[33.60,130.42],[33.38,130.51],[32.80,130.71],[32.21,130.76],[32.05,130.81],[31.60,130.56]]},
 {ans:'北陸', unit:'自動車道', mark:'G', hint:'米原〜新潟。日本海側を通る',
  line:[[35.31,136.29],[35.65,136.07],[36.06,136.22],[36.58,136.65],[36.70,137.21],[37.04,137.86],[37.15,138.24],[37.45,138.85],[37.90,139.02]]},
].map(d=>({...d,cat:'高速道路',pref:'',ask:'この道路の名前は？',label:`地図2・記号 ${d.mark}`}));

/* ── 新幹線（終点を答える） ── */
const RAILS = [
 {ans:'博多', route:'東海道・山陽新幹線', mark:'A', hint:'起点は東京駅。西のはしは福岡県',
  line:[[35.68,139.77],[35.51,139.62],[34.97,138.39],[34.70,137.73],[35.17,136.88],[34.99,135.76],[34.73,135.50],[34.67,133.92],[34.40,132.48],[34.09,131.40],[33.89,130.88],[33.59,130.42]]},
 {ans:'新青森', route:'東北新幹線', mark:'B', hint:'起点は東京駅。北のはしは青森県',
  line:[[35.68,139.77],[35.91,139.62],[36.56,139.90],[37.75,140.46],[38.26,140.88],[38.93,141.13],[39.70,141.14],[40.51,141.49],[40.83,140.70]]},
 {ans:'敦賀', route:'北陸新幹線', mark:'D', hint:'起点は東京駅。2024年に金沢から延びた（福井県）',
  line:[[35.68,139.77],[35.91,139.62],[36.32,139.01],[36.64,138.19],[36.70,137.21],[36.58,136.65],[35.65,136.07]]},
 {ans:'新庄', route:'山形新幹線', mark:'E', hint:'起点は東京駅。福島から山形へ入る',
  line:[[35.68,139.77],[35.91,139.62],[37.75,140.46],[38.25,140.33],[38.76,140.30]]},
].map(d=>({...d,cat:'新幹線',unit:'駅',pref:d.route,ask:'この新幹線の終点の駅は？',label:`地図4・記号 ${d.mark}`}));

const ALL=[...CITIES,...ROADS,...RAILS];

/* ── 状態 ── */
let cat='all', mode='recall', zoomPref='zoom', zoomed=true;
let deck=[], idx=0, revealed=false, picked=null, results=[];
const $=id=>document.getElementById(id);
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const show=s=>['setup','quiz','result'].forEach(x=>$(x).classList.toggle('hidden',x!==s));

/* ── 設定画面 ── */
const CATS=[{key:'all',name:'ぜんぶ',n:ALL.length,c:'#16233D'},
 {key:'都市',name:'都市',n:CITIES.length,c:COLOR['都市']},
 {key:'高速道路',name:'高速道路',n:ROADS.length,c:COLOR['高速道路']},
 {key:'新幹線',name:'新幹線の終点',n:RAILS.length,c:COLOR['新幹線']}];
const MODES=[{key:'recall',name:'思い出す',desc:'頭に浮かべて自己採点'},{key:'choice',name:'4択',desc:'選たくしから選ぶ'}];
const ZOOMS=[{key:'zoom',name:'その地方を拡大',desc:'まず場所をつかむ'},{key:'whole',name:'日本全体',desc:'入試に近い'}];

function renderSetup(){
  $('catBtns').innerHTML=CATS.map(o=>`<button class="card" data-k="${o.key}"
    style="border-color:${cat===o.key?o.c:'var(--line)'};background:${cat===o.key?o.c:'#fff'};
    color:${cat===o.key?'#fff':'var(--ink)'};box-shadow:${cat===o.key?'0 4px 14px '+o.c+'44':'none'}">
    <span class="n">${o.name}</span><span class="s">${o.n}問</span></button>`).join('');
  const pair=(arr,cur)=>arr.map(o=>`<button class="card left" data-k="${o.key}"
    style="border-color:${cur===o.key?'#16233D':'var(--line)'};background:${cur===o.key?'#16233D':'#fff'};
    color:${cur===o.key?'#fff':'var(--ink)'}"><span class="n">${o.name}</span><span class="s">${o.desc}</span></button>`).join('');
  $('modeBtns').innerHTML=pair(MODES,mode);
  $('zoomBtns').innerHTML=pair(ZOOMS,zoomPref);
  $('catBtns').querySelectorAll('button').forEach(b=>b.onclick=()=>{cat=b.dataset.k;renderSetup();});
  $('modeBtns').querySelectorAll('button').forEach(b=>b.onclick=()=>{mode=b.dataset.k;renderSetup();});
  $('zoomBtns').querySelectorAll('button').forEach(b=>b.onclick=()=>{zoomPref=b.dataset.k;renderSetup();});
}
renderSetup();

/* ── 地図描画 ── */
function drawMap(q){
  const c=COLOR[q.cat];
  // ほかの出題地点（薄い点）
  $('others').innerHTML=CITIES.filter(d=>d.ans!==q.ans).map(d=>{
    const [x,y]=xy(d.lat,d.lon);
    return `<circle class="dot-o" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.5"/>`;}).join('');
  // 路線（該当外は灰色）
  const lines=[...ROADS,...RAILS];
  $('routes').innerHTML=lines.map(d=>{
    const pts=d.line.map(([la,lo])=>xy(la,lo).map(v=>v.toFixed(1)).join(',')).join(' ');
    if(d.ans===q.ans&&d.cat===q.cat) return '';
    return `<polyline class="route-o" points="${pts}"/>`;}).join('');
  // ターゲット
  let t='';
  if(q.cat==='都市'){
    const [x,y]=xy(q.lat,q.lon);
    t=`<circle id="ping" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="9" fill="none" stroke="${c}" stroke-width="4"/>
       <circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="9" fill="${c}" stroke="#fff" stroke-width="3"/>`;
  }else{
    const pts=q.line.map(([la,lo])=>xy(la,lo).map(v=>v.toFixed(1)).join(',')).join(' ');
    const [ex,ey]=xy(...q.line[q.line.length-1]);
    const [sx,sy]=xy(...q.line[0]);
    t=`<polyline class="route-hi" points="${pts}" stroke="${c}"/>
       <circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="7" fill="#fff" stroke="${c}" stroke-width="4"/>`;
    if(q.cat==='新幹線')
      t+=`<circle id="ping" cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="9" fill="none" stroke="${c}" stroke-width="4"/>
          <circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="9" fill="${c}" stroke="#fff" stroke-width="3"/>`;
  }
  $('target').innerHTML=t;
  zoomed=(zoomPref==='zoom');
  applyZoom(q);
}

function applyZoom(q){
  const vp=$('vp'), btn=$('zoomtog');
  if(!zoomed){ vp.style.transform='none'; btn.textContent='拡大する'; return; }
  let cx,cy,sp;
  if(q.cat==='都市'){ [cx,cy]=xy(q.lat,q.lon); sp=250; }
  else{
    const ps=q.line.map(([la,lo])=>xy(la,lo));
    const xs=ps.map(p=>p[0]), ys=ps.map(p=>p[1]);
    cx=(Math.min(...xs)+Math.max(...xs))/2; cy=(Math.min(...ys)+Math.max(...ys))/2;
    sp=Math.max(Math.max(...xs)-Math.min(...xs), Math.max(...ys)-Math.min(...ys))*0.62+90;
  }
  const k=Math.min(3.2, Math.max(1.15, MW/(sp*2)));
  const tx=MW/2-cx*k, ty=MH/2-cy*k;
  vp.style.transformOrigin='0 0';
  vp.style.transform=`translate(${tx.toFixed(1)}px, ${ty.toFixed(1)}px) scale(${k.toFixed(3)})`;
  btn.textContent='全体を見る';
}
function toggleZoom(){ zoomed=!zoomed; applyZoom(deck[idx]); }

/* ── 出題 ── */
function start(){
  deck=shuffle(cat==='all'?ALL:ALL.filter(d=>d.cat===cat));
  idx=0; results=[]; show('quiz'); renderQ();
}
function renderQ(){
  revealed=false; picked=null;
  const q=deck[idx], c=COLOR[q.cat];
  const p=$('progress'); p.querySelectorAll('.stop').forEach(e=>e.remove());
  const last=deck.length-1||1;
  $('fill').style.background=c;
  $('fill').style.width=`calc(${(idx/last)*100}% - ${(idx/last)*7}px)`;
  deck.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='stop'+(i<idx?' done':i===idx?' now':'');
    d.style.color=c; if(i===idx) d.style.borderColor=c;
    d.style.left=`calc(${(i/last)*100}% - ${(i/last)*(i===idx?11:7)}px + 4px)`;
    p.appendChild(d);
  });
  $('qcat').textContent=q.label; $('qcat').style.background=c;
  $('qcount').textContent=`${idx+1} / ${deck.length}`;
  $('qask').textContent=q.ask; $('qask').style.color=c;
  $('qhint').textContent=q.hint;
  $('answer').classList.add('hidden');
  $('ansmain').innerHTML=`<span style="color:${c}">${q.ans}</span><span class="unit">${q.unit}</span>`;
  $('anspref').textContent=q.pref||'';
  drawMap(q); renderControls();
}
function renderControls(){
  const q=deck[idx], box=$('controls');
  if(mode==='recall'){
    box.className='';
    if(!revealed){
      box.innerHTML=`<button class="btn-primary btn-dark">答えを見る</button>`;
      box.querySelector('button').onclick=()=>{revealed=true;$('answer').classList.remove('hidden');renderControls();};
    }else{
      box.innerHTML=`<div class="row">
        <button class="btn-grade" style="color:var(--city);border-color:var(--city)">× まちがえた</button>
        <button class="btn-grade" style="color:var(--road);border-color:var(--road)">○ できた</button></div>`;
      const[ng,ok]=box.querySelectorAll('button'); ng.onclick=()=>grade(false); ok.onclick=()=>grade(true);
    }
  }else{
    const same=ALL.filter(d=>d.cat===q.cat&&d.ans!==q.ans);
    const opts=shuffle([q.ans,...shuffle(same).slice(0,3).map(d=>d.ans)]);
    box.className='col';
    box.innerHTML=opts.map(o=>`<button class="btn-choice" data-a="${o}">${o}${q.unit}</button>`).join('');
    box.querySelectorAll('button').forEach(b=>b.onclick=()=>pick(b,q));
  }
}
function pick(btn,q){
  if(picked)return; picked=btn.dataset.a;
  $('controls').querySelectorAll('button').forEach(b=>{
    if(b.dataset.a===q.ans){b.style.background='#E9F6EE';b.style.borderColor='var(--road)';b.style.color='var(--road)';}
    else if(b.dataset.a===picked){b.style.background='#FBEAE5';b.style.borderColor='var(--city)';b.style.color='var(--city)';}
    b.style.cursor='default';});
  $('answer').classList.remove('hidden');
  setTimeout(()=>grade(picked===q.ans),900);
}
function grade(ok){
  results.push({item:deck[idx],correct:ok});
  if(idx+1>=deck.length) renderResult(); else {idx++; renderQ();}
}
function renderResult(){
  const s=results.filter(r=>r.correct).length, pct=Math.round(s/results.length*100);
  $('score').innerHTML=`${s}<span> / ${results.length}</span>`;
  $('verdict').textContent=(pct>=80?'よくできました！':pct>=50?'あと少し！':'復習しよう')+`（${pct}%）`;
  $('verdict').style.color=pct>=80?'var(--road)':pct>=50?'#D98A00':'var(--city)';
  const w=results.filter(r=>!r.correct);
  $('wrongWrap').innerHTML=w.length?`<div class="seclabel">まちがえたところ（覚え直し）</div>
    <div class="col">${w.map(r=>`<div class="review">
      <span class="tag" style="background:${COLOR[r.item.cat]}">${r.item.cat}</span>
      <div style="flex:1"><div style="font-weight:700">${r.item.ans}${r.item.unit}
      ${r.item.pref?`<span style="font-weight:400;color:var(--muted);font-size:13px">（${r.item.pref}）</span>`:''}</div>
      <div class="h">${r.item.hint}</div></div></div>`).join('')}</div>`:'';
  show('result');
}
</script>
</body>
</html>
