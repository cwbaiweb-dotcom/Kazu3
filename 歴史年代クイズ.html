<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史年代表100 クイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --washi: #efe8d8;
    --sumi: #2b2b2b;
    --sumi-soft: #4a4a45;
    --aizome: #2c4a6e;
    --aizome-deep: #1c324c;
    --shuiro: #b5451c;
    --kincha: #a9781f;
    --moss: #5f6f4e;
    --line: rgba(43,43,43,0.16);
    --card-shadow: 0 18px 40px rgba(43,30,10,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(169,120,31,0.10), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(44,74,110,0.10), transparent 55%),
      var(--washi);
    font-family: "Noto Sans JP", sans-serif;
    color: var(--sumi);
    min-height:100vh;
    padding: 28px 16px 60px;
  }
  .wrap{ max-width: 720px; margin: 0 auto; }

  header{ text-align:center; margin-bottom: 22px; }
  .eyebrow{ font-size: 12px; letter-spacing: 0.35em; color: var(--kincha); font-weight:700; }
  h1{
    font-family: "Shippori Mincho", serif;
    font-weight: 800;
    font-size: clamp(24px, 6vw, 34px);
    margin: 6px 0 4px;
    letter-spacing: 0.04em;
  }
  .sub{ font-size: 13px; color: var(--sumi-soft); }

  .account-bar{
    display:flex; justify-content:center; align-items:center; gap:10px;
    margin-top: 10px; font-size: 13px; color: var(--sumi-soft);
  }
  .account-bar .name-pill{
    font-family: "Shippori Mincho", serif;
    font-weight:700;
    color: var(--aizome-deep);
    background: rgba(44,74,110,0.08);
    padding: 3px 12px;
    border-radius: 20px;
  }
  .switch-link{
    font-size:12px; color: var(--shuiro); background:none; border:none;
    text-decoration:underline; cursor:pointer; font-family:inherit;
  }

  .timeline-map{ margin: 18px auto 0; max-width: 640px; position: relative; height: 34px; }
  .timeline-map .rail{
    position:absolute; left:0; right:0; top:16px; height:2px;
    background: linear-gradient(90deg, var(--aizome), var(--kincha) 50%, var(--shuiro));
    opacity:0.35;
  }
  .timeline-map .dot{
    position:absolute; top:11px; width:6px; height:6px; border-radius:50%;
    background: var(--sumi); opacity:0.18; transform: translateX(-50%); transition: all .25s ease;
  }
  .timeline-map .dot.done{ background: var(--moss); opacity:0.55; }
  .timeline-map .dot.current{
    width:12px; height:12px; top:8px; background: var(--shuiro); opacity:1;
    box-shadow: 0 0 0 4px rgba(181,69,28,0.18);
  }
  .timeline-map .era-label{ position:absolute; top:-4px; font-size:10px; color: var(--sumi-soft); transform: translateX(-50%); white-space:nowrap; }

  .card{
    background: #faf6ec; border: 1px solid var(--line); border-radius: 4px;
    box-shadow: var(--card-shadow); padding: 30px 26px 26px; margin-top: 26px; position: relative;
  }
  .card::before{
    content:""; position:absolute; left:14px; right:14px; top:8px; bottom:8px;
    border: 1px solid rgba(169,120,31,0.28); border-radius: 2px; pointer-events:none;
  }
  .center-card{ text-align:center; }

  /* ---- Login ---- */
  .avatar-grid{
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 22px 0 6px;
  }
  .avatar-btn{
    font-family:"Shippori Mincho", serif;
    font-size: 22px; font-weight:800;
    padding: 26px 8px;
    border-radius: 4px;
    border: 1.5px solid var(--line);
    background: #fff;
    cursor:pointer;
    color: var(--aizome-deep);
    transition: all .12s ease;
  }
  .avatar-btn:hover{ border-color: var(--aizome); background: #f2f1ea; transform: translateY(-2px); }
  .avatar-btn .kana{ display:block; font-size:11px; color: var(--sumi-soft); font-weight:500; margin-top:6px; font-family:"Noto Sans JP",sans-serif; letter-spacing:0.1em; }

  /* ---- Home / dashboard ---- */
  .stat-grid{
    display:grid; grid-template-columns: repeat(auto-fit, minmax(76px,1fr)); gap:10px; margin: 18px 0 22px;
  }
  .stat-box{
    background:#fff; border:1px solid var(--line); border-radius:3px; padding: 14px 8px;
  }
  .stat-box .num{ font-family:"Shippori Mincho", serif; font-size:26px; font-weight:800; color: var(--aizome-deep); }
  .stat-box .label{ font-size:11px; color: var(--sumi-soft); margin-top:2px; }

  .weak-list{ text-align:left; margin-top: 10px; }
  .weak-list h3{
    font-family:"Shippori Mincho", serif; font-size:15px; color: var(--sumi);
    border-bottom: 1px solid var(--line); padding-bottom:6px; margin-bottom:10px;
  }
  .weak-row{
    display:flex; justify-content:space-between; gap:10px;
    font-size:13px; padding: 7px 0; border-bottom: 1px dashed var(--line);
  }
  .weak-row .wi{ flex:1; }
  .weak-row .wy{ color: var(--aizome-deep); font-weight:700; white-space:nowrap; }
  .weak-row .wp{ width:70px; text-align:right; font-weight:700; white-space:nowrap; }
  .weak-row .wp.low{ color: var(--shuiro); }
  .weak-row .wp.mid{ color: var(--kincha); }
  .weak-row .wp.high{ color: var(--moss); }

  .btn-row{ display:flex; flex-direction:column; gap:10px; margin-top: 8px; }

  .star-btn{
    border: 1.5px solid var(--line);
    background: #fff;
    border-radius: 3px;
    cursor: pointer;
    font-size: 18px;
    line-height:1;
    padding: 9px 12px;
    color: var(--kincha);
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family: "Noto Sans JP", sans-serif;
    transition: all .12s ease;
  }
  .star-btn:hover{ border-color: var(--kincha); background: rgba(169,120,31,0.08); }
  .star-btn.active{ background: rgba(169,120,31,0.14); border-color: var(--kincha); color: var(--kincha); font-weight:700; }
  .star-btn .lbl{ font-size:12px; }

  .search-btn{
    border: 1.5px solid var(--line);
    background: #fff;
    border-radius: 3px;
    cursor: pointer;
    font-size: 15px;
    line-height:1;
    padding: 9px 10px;
    color: var(--aizome-deep);
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-family: "Noto Sans JP", sans-serif;
    transition: all .12s ease;
  }
  .search-btn:hover{ border-color: var(--aizome); background: rgba(44,74,110,0.08); }
  .search-btn .lbl{ font-size:12px; }
  .review-item .search-btn{ position:absolute; top:8px; right:44px; padding: 5px 8px; font-size:14px; }

  .top-actions{ display:flex; justify-content:flex-end; margin-bottom: 6px; }

  .review-item{ position:relative; }
  .review-item .star-btn{ position:absolute; top:8px; right:8px; padding: 5px 8px; font-size:15px; }

  .fav-empty{ font-size:13px; color: var(--sumi-soft); padding: 20px 0; }

  .mode-toggle{
    display:flex; gap:8px; margin: 4px 0 16px; justify-content:center;
  }
  .mode-btn{
    flex:1; max-width: 220px;
    font-family: "Shippori Mincho", serif; font-size: 13.5px; font-weight:700;
    padding: 10px 8px; border-radius: 3px; border: 1.5px solid var(--line);
    background: #fff; color: var(--sumi-soft); cursor:pointer; transition: all .12s ease;
  }
  .mode-btn:hover{ border-color: var(--aizome); }
  .mode-btn.active{ background: var(--aizome); border-color: var(--aizome); color: #faf6ec; }

  .year-input-row{
    display:flex; gap:10px; align-items:stretch; margin-top:4px;
  }
  .year-input{
    flex:1;
    font-family: "Shippori Mincho", serif;
    font-size: 22px; font-weight:700; letter-spacing: 0.08em;
    text-align:center;
    padding: 12px 10px;
    border: 1.5px solid var(--line);
    border-radius: 3px;
    color: var(--aizome-deep);
    background:#fff;
  }
  .year-input:focus{ outline:none; border-color: var(--aizome); }
  .year-input.input-correct{ border-color: var(--moss); background: rgba(95,111,78,0.14); }
  .year-input.input-wrong{ border-color: var(--shuiro); background: rgba(181,69,28,0.10); }
  .year-input-suffix{
    display:flex; align-items:center; font-family:"Shippori Mincho", serif;
    font-size:16px; color: var(--sumi-soft);
  }
  .year-submit-btn{
    font-family: "Shippori Mincho", serif; font-size: 15px; font-weight:700;
    padding: 0 20px; border-radius: 3px; border:none; color:#faf6ec;
    background: var(--shuiro); cursor:pointer;
  }
  .year-submit-btn:hover:not(:disabled){ background: var(--aizome-deep); }
  .year-submit-btn:disabled{ opacity:0.5; cursor:default; }
  .year-input-hint{ font-size:11.5px; color: var(--sumi-soft); margin-top:6px; }

  .big-btn{
    font-family: "Shippori Mincho", serif; font-size: 18px; font-weight: 800; letter-spacing: 0.1em;
    padding: 16px 40px; border-radius: 3px; border: none; color: #faf6ec;
    background: var(--shuiro); cursor: pointer; box-shadow: 0 8px 18px rgba(181,69,28,0.28);
  }
  .big-btn:hover{ background: var(--aizome-deep); box-shadow: 0 8px 18px rgba(44,74,110,0.28); }
  .ghost-btn{
    font-family: "Shippori Mincho", serif; font-size: 14px; font-weight: 700; letter-spacing: 0.06em;
    padding: 12px 20px; border-radius: 3px; border: 1.5px solid var(--aizome); color: var(--aizome-deep);
    background: transparent; cursor:pointer;
  }
  .ghost-btn:hover{ background: rgba(44,74,110,0.08); }

  /* ---- Quiz ---- */
  .progress-row{ display:flex; justify-content:space-between; align-items:baseline; font-family:"Shippori Mincho", serif; margin-bottom: 18px; }
  .progress-row .qnum{ font-size:15px; color: var(--sumi-soft); letter-spacing:0.05em; }
  .progress-row .qnum b{ font-size:22px; color: var(--aizome-deep); }
  .progress-row .score{ font-size:14px; color: var(--kincha); font-weight:600; }

  .qtype-tag{ display:inline-block; font-size: 11px; letter-spacing: 0.12em; color: #fff; background: var(--aizome); padding: 3px 10px; border-radius: 2px; margin-bottom: 14px; }
  .qtype-tag.era-to-event{ background: var(--shuiro); }

  .question-text{
    font-family: "Shippori Mincho", serif; font-size: clamp(19px, 5vw, 25px); font-weight: 600;
    line-height: 1.55; color: var(--sumi); margin-bottom: 22px;
  }
  .question-text .year-big{ font-size: 1.3em; color: var(--aizome-deep); font-weight:800; letter-spacing:0.02em; }

  .choices{ display:grid; gap: 10px; }
  .choice-btn{
    text-align:left; font-family: inherit; font-size: 16px; padding: 14px 16px; border-radius: 3px;
    border: 1.5px solid var(--line); background: #fff; cursor:pointer; color: var(--sumi);
    transition: all .12s ease; line-height:1.4;
  }
  .choice-btn:hover:not(:disabled){ border-color: var(--aizome); background: #f2f1ea; }
  .choice-btn:disabled{ cursor:default; }
  .choice-btn.correct{ border-color: var(--moss); background: rgba(95,111,78,0.14); font-weight:700; }
  .choice-btn.wrong{ border-color: var(--shuiro); background: rgba(181,69,28,0.10); text-decoration: line-through; opacity:0.75; }

  .feedback-box{ margin-top: 18px; padding: 14px 16px; border-left: 3px solid var(--kincha); background: rgba(169,120,31,0.08); font-size: 14px; line-height:1.7; display:none; }
  .feedback-box.show{ display:block; }
  .feedback-box .mnemonic{ font-family:"Shippori Mincho", serif; font-weight:600; color: var(--aizome-deep); }

  .next-btn{
    margin-top: 20px; display:none; width:100%; padding: 14px; font-family: "Shippori Mincho", serif;
    font-size: 16px; font-weight: 700; letter-spacing: 0.08em; color: #faf6ec; background: var(--sumi);
    border: none; border-radius: 3px; cursor:pointer;
  }
  .next-btn.show{ display:block; }
  .next-btn:hover{ background: var(--aizome-deep); }

  .result-score{ font-family:"Shippori Mincho", serif; font-size: 52px; font-weight: 800; color: var(--aizome-deep); margin: 8px 0 2px; }
  .result-score span{ font-size: 22px; color: var(--sumi-soft); font-weight:500;}
  .result-comment{ font-size:14px; color: var(--kincha); font-weight:600; margin-bottom: 22px;}

  .review-list{ text-align:left; margin-top: 10px; display:grid; gap: 10px; }
  .review-item{
    border: 1px solid var(--line); border-left: 4px solid var(--shuiro); background:#fff;
    padding: 10px 84px 10px 14px; border-radius: 2px; font-size: 13px; line-height:1.7;
  }
  .review-item.ok{ border-left-color: var(--moss); }
  .review-item .ritem{ font-weight:700; }
  .review-item .ryear{ color: var(--aizome-deep); font-weight:700; }

  footer{ text-align:center; margin-top: 30px; font-size:11px; color: var(--sumi-soft); opacity:0.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">これだけは覚えたい</div>
    <h1>歴史年代表100 クイズ</h1>
    <div class="sub">239年〜2011年・全100項目／3回連続正解で復習不要に</div>
    <div class="account-bar" id="accountBar" style="display:none;">
      <span>ログイン中：</span><span class="name-pill" id="accountNamePill"></span>
      <button class="switch-link" id="switchAccountBtn">アカウント切替</button>
    </div>
    <div class="timeline-map" id="timelineMap"></div>
  </header>

  <div id="app"></div>

  <footer>早稲田アカデミー「歴史年代表100」より作成 ／ 成績はこの端末のブラウザに保存されます</footer>
</div>

const MIN_YEAR = 239, MAX_YEAR = 2011;
const ACCOUNTS = ["音", "昂", "暁"];
const STORAGE_KEY = "rekishi100_quiz_v1";

// ---- storage ----
function loadAllData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const fresh = {};
  ACCOUNTS.forEach(a=>{
    fresh[a] = { items: {}, quizzesTaken: 0, totalCorrect: 0, totalAnswered: 0, favorites: {}, queue: [] };
  });
  return fresh;
}
function saveAllData(d){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }catch(e){}
}
let ALL_DATA = loadAllData();

const MASTERY_THRESHOLD = 3;
const WRONG_FLAG_THRESHOLD = 3;

function getAccountStats(name){
  if(!ALL_DATA[name]) ALL_DATA[name] = { items: {}, quizzesTaken: 0, totalCorrect: 0, totalAnswered: 0, favorites: {}, queue: [] };
  if(!ALL_DATA[name].favorites) ALL_DATA[name].favorites = {};
  if(!ALL_DATA[name].queue) ALL_DATA[name].queue = [];
  return ALL_DATA[name];
}

function isMastered(stats, dataIdx){
  const s = stats.items[dataIdx];
  return !!s && s.correctStreak >= MASTERY_THRESHOLD;
}
function isFrequentlyWrong(stats, dataIdx){
  const s = stats.items[dataIdx];
  return !!s && s.wrongTotal >= WRONG_FLAG_THRESHOLD;
}
function masteredCount(stats){
  let n = 0;
  for(let i=0;i<DATA.length;i++) if(isMastered(stats, i)) n++;
  return n;
}
function sourcePoolCount(stats){
  return DATA.length - masteredCount(stats);
}

// Pulls the next batch of questions (up to 20) from the account's shuffled,
// mastery-aware queue. The queue is a standing random order of all not-yet-
// mastered items; it's consumed batch by batch across quiz sessions, and
// reshuffled from the remaining un-mastered pool once exhausted, so every
// item gets asked before any repeats happen.
function nextQuizIndices(stats){
  stats.queue = stats.queue.filter(idx => !isMastered(stats, idx));
  const unmastered = [];
  for(let i=0;i<DATA.length;i++) if(!isMastered(stats, i)) unmastered.push(i);
  if(unmastered.length === 0) return [];

  if(stats.queue.length === 0){
    stats.queue = shuffle(unmastered);
  }
  const take = stats.queue.slice(0, Math.min(20, stats.queue.length));
  stats.queue = stats.queue.slice(take.length);
  saveAllData(ALL_DATA);
  return take;
}

function isFavorite(name, dataIdx){
  const stats = getAccountStats(name);
  return !!stats.favorites[dataIdx];
}
function toggleFavorite(name, dataIdx){
  const stats = getAccountStats(name);
  if(stats.favorites[dataIdx]) delete stats.favorites[dataIdx];
  else stats.favorites[dataIdx] = true;
  saveAllData(ALL_DATA);
  return !!stats.favorites[dataIdx];
}

// ---- helpers ----
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pctPos(year){ return ((year - MIN_YEAR) / (MAX_YEAR - MIN_YEAR)) * 100; }
function openGoogleSearch(query){
  window.open("https://www.google.com/search?q=" + encodeURIComponent(query), "_blank", "noopener");
}

  screen: "login", // login | home | quiz | result
  account: null,

  answered: false,
  log: []

function buildQuestionsFromIndices(indices, forceType){
  return indices.map(idx=>{
    const [item, year, mnemonic] = DATA[idx];
    const type = forceType || (Math.random() < 0.5 ? "event2year" : "year2event");
    let choices, correctIdx;
    if(type === "event2year"){
      const distractYears = shuffle(DATA.filter((d,i)=>i!==idx).map(d=>d[1]));
      const yrSet = new Set([year]);
      const opts = [year];
      for(const y of distractYears){
        if(opts.length>=4) break;
        if(!yrSet.has(y)){ yrSet.add(y); opts.push(y); }
      }
      const shuffled = shuffle(opts.map((y,i)=>({y, isCorrect:y===year})));
      choices = shuffled.map(o=>String(o.y)+"年");
      correctIdx = shuffled.findIndex(o=>o.isCorrect);
    } else {
      const distractItems = shuffle(DATA.filter((d,i)=>i!==idx).map(d=>d[0]));
      const opts = [item, ...distractItems.slice(0,3)];
      const shuffled = shuffle(opts.map(o=>({text:o, isCorrect:o===item})));
      choices = shuffled.map(o=>o.text);
      correctIdx = shuffled.findIndex(o=>o.isCorrect);
    }
    return {dataIdx: idx, item, year, mnemonic, type, choices, correctIdx};
  });
}

// In "year input" mode there's no sensible way to type a full event
// description, so every question is asked as event -> year (the child
// types the year); in "choice" mode the type is randomized as before.
function buildQuiz(account){
  const stats = getAccountStats(account);
  const chosen = nextQuizIndices(stats);
  const forceType = state.quizMode === "input" ? "event2year" : null;
  return buildQuestionsFromIndices(chosen, forceType);
}

// Rebuilds a quiz using the exact same set of items as the just-finished
// quiz (fresh answer-choice shuffling and question-type randomization),
// for extra drilling on a tricky batch without pulling new items.
function buildRepeatQuiz(previousQuestions){
  const indices = previousQuestions.map(q=>q.dataIdx);
  const forceType = state.quizMode === "input" ? "event2year" : null;
  return buildQuestionsFromIndices(shuffle(indices), forceType);
}

          <div class="year-input-hint">3桁・4桁どちらの年代でも、数字だけ入力してください</div>
        ` : `<div class="choices" id="choices"></div>`}
        <div class="feedback-box" id="feedback"></div>
        <button class="next-btn" id="nextBtn">${state.qIndex===state.questions.length-1 ? "結果を見る" : "次の問題へ"}</button>
      </div>
    `;
    if(useInput){
      const inputEl = document.getElementById('yearInput');
      const submitBtn = document.getElementById('yearSubmitBtn');
      submitBtn.onclick = submitYearAnswer;
      inputEl.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter') submitYearAnswer();
      });
      inputEl.focus();
    } else {
      const choicesEl = document.getElementById('choices');
      q.choices.forEach((c, i)=>{
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c;
        btn.onclick = ()=> selectAnswer(i);
        choicesEl.appendChild(btn);
      });
    }
    document.getElementById('nextBtn').onclick = nextQuestion;
    document.getElementById('favToggleBtn').onclick = ()=>{
      const nowFav = toggleFavorite(state.account, q.dataIdx);
      const btn = document.getElementById('favToggleBtn');
      btn.classList.toggle('active', nowFav);
    };
    document.getElementById('searchBtn').onclick = ()=>{
      openGoogleSearch(q.item);
    };
    return;
  }

  if(state.screen === "result"){
    renderTimelineMap(null, true);
    const pct = Math.round((state.score/20)*100);
    let comment;
    if(pct===100) comment = "満点！歴史マスター認定です";
    else if(pct>=80) comment = "あと少し！よく覚えています";
    else if(pct>=50) comment = "半分以上正解！この調子で復習を";
    else comment = "語呂合わせを見直してもう一度挑戦しよう";

    const reviewHtml = state.log.map(l=>{
      const nowMastered = isMastered(getAccountStats(state.account), l.dataIdx);
      return `<div class="review-item ${l.correct ? 'ok' : ''}">
        <button class="search-btn" data-search="${l.item.replace(/"/g,'&quot;')}">🔍</button>
        <button class="star-btn ${isFavorite(state.account, l.dataIdx) ? 'active' : ''}" data-idx="${l.dataIdx}">★</button>
        <span class="ritem">${l.item}</span> — <span class="ryear">${l.year}年</span> ${nowMastered ? '<span style="color:var(--moss);font-weight:700;">卒業！</span>' : ''}<br>
        ${l.mnemonic}
      </div>`;
    }).join("");

    const stats = getAccountStats(state.account);
    const remaining = sourcePoolCount(stats);

    app.innerHTML = `
      <div class="card center-card">
        <div class="qtype-tag">${state.account} さんの結果</div>
        <div class="result-score">${state.score}<span> / ${state.questions.length} 問正解</span></div>
        <div class="result-comment">${comment}</div>
        <div class="btn-row">
          <button class="big-btn" id="repeatSameBtn">今の${state.questions.length}問をもう一度</button>
          ${remaining > 0
            ? `<button class="ghost-btn" id="retryBtn">新しい問題に挑戦する</button>`
            : `<div class="result-comment" style="margin:0 0 4px;">🎉 全100問、3回連続正解して復習不要になりました！</div>`
          }
          <button class="ghost-btn" id="homeBtn">成績ページにもどる</button>
        </div>
        <div class="review-list">${reviewHtml}</div>
      </div>
    `;
    document.getElementById('repeatSameBtn').onclick = ()=>{
      state.questions = buildRepeatQuiz(state.questions);
      state.qIndex = 0; state.score = 0; state.answered=false; state.log=[];
      state.screen = "quiz";
      render();
    };
    const retryBtn = document.getElementById('retryBtn');
    if(retryBtn){
      retryBtn.onclick = ()=>{
        state.questions = buildQuiz(state.account);
        state.qIndex = 0; state.score = 0; state.answered=false; state.log=[];
        state.screen = "quiz";
        render();
      };
    }
    document.getElementById('homeBtn').onclick = ()=>{
      state.screen = "home";
      render();
    };
    app.querySelectorAll('.review-item .star-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const nowFav = toggleFavorite(state.account, Number(btn.dataset.idx));
        btn.classList.toggle('active', nowFav);
      };
    });
    app.querySelectorAll('.review-item .search-btn').forEach(btn=>{
      btn.onclick = ()=> openGoogleSearch(btn.dataset.search);
    });
    return;
  }
}

// Shared bookkeeping for both answer modes: updates score, the review log,
// and the account's per-item mastery/wrong-count stats.
function recordAnswer(correct){
  state.answered = true;
  const q = state.questions[state.qIndex];
  if(correct) state.score++;
  state.log.push({dataIdx:q.dataIdx, item:q.item, year:q.year, mnemonic:q.mnemonic, correct});

  const stats = getAccountStats(state.account);
  if(!stats.items[q.dataIdx]) stats.items[q.dataIdx] = {attempts:0, correctStreak:0, correctTotal:0, wrongTotal:0};
  const itemStat = stats.items[q.dataIdx];
  itemStat.attempts++;
  if(correct){
    itemStat.correctStreak++;
    itemStat.correctTotal++;
  } else {
    itemStat.correctStreak = 0; // one miss clears the streak toward mastery
    itemStat.wrongTotal++;
  }
  stats.totalAnswered++;
  if(correct) stats.totalCorrect++;
  saveAllData(ALL_DATA);
  return q;
}

function showFeedback(correct, mnemonic, correctYear){
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  fb.innerHTML = `${correct ? "○ 正解！" : "× 残念、正解は " + correctYear + "年"}<br><span class="mnemonic">${mnemonic}</span>`;
  document.getElementById('nextBtn').classList.add('show');
}

function selectAnswer(i){
  if(state.answered) return;
  const q = state.questions[state.qIndex];
  const correct = i === q.correctIdx;
  recordAnswer(correct);

  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach((b, idx)=>{
    b.disabled = true;
    if(idx === q.correctIdx) b.classList.add('correct');
    else if(idx === i) b.classList.add('wrong');
  });

  showFeedback(correct, q.mnemonic, q.year);
}

function submitYearAnswer(){
  if(state.answered) return;
  const q = state.questions[state.qIndex];
  const inputEl = document.getElementById('yearInput');
  const submitBtn = document.getElementById('yearSubmitBtn');
  const raw = (inputEl.value || "").trim();
  const val = parseInt(raw, 10);
  const correct = !isNaN(val) && String(val) === raw.replace(/^0+(?=\d)/, "") && val === q.year;

  recordAnswer(correct);

  inputEl.disabled = true;
  submitBtn.disabled = true;
  inputEl.classList.add(correct ? 'input-correct' : 'input-wrong');
  if(!correct){
    inputEl.value = raw + "　→　正解: " + q.year;
  }

  showFeedback(correct, q.mnemonic, q.year);
}

function nextQuestion(){
  if(state.qIndex >= state.questions.length-1){
    const stats = getAccountStats(state.account);
    stats.quizzesTaken++;
    saveAllData(ALL_DATA);
    state.screen = "result";
    render();
    return;
  }
  state.qIndex++;
  state.answered = false;
  render();
}

function renderTimelineMap(currentYear, done){
  const map = document.getElementById('timelineMap');
  let html = `<div class="rail"></div>`;
  const labels = [
    [239,"古代"],[710,"奈良"],[794,"平安"],[1192,"鎌倉"],[1336,"室町"],
    [1603,"江戸"],[1868,"明治"],[1912,"大正〜昭和"],[1989,"平成〜"]
  ];
  labels.forEach(([y,label])=>{
    html += `<div class="era-label" style="left:${pctPos(y)}%">${label}</div>`;
  });
  const answeredYears = done ? state.log.map(l=>l.year) : (state.screen==="quiz" ? state.questions.slice(0,state.qIndex).map(q=>q.year) : []);
  DATA.forEach(d=>{
    const y = d[1];
    let cls = "dot";
    if(currentYear && y===currentYear) cls += " current";
    else if(answeredYears.includes(y)) cls += " done";
    html += `<div class="${cls}" style="left:${pctPos(y)}%"></div>`;
  });
  map.innerHTML = html;
}

render();
</script>
