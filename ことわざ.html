<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ことわざ道場 ｜ 中学受験 語句の知識</title>
<style>
:root{
  --ai:#17324a;        /* 藍 */
  --ai-2:#24506f;      /* 浅葱がかった藍 */
  --kinari:#f6f1e4;    /* 生成り */
  --washi:#fffcf5;     /* 和紙 */
  --sumi:#20242b;      /* 墨 */
  --usuzumi:#6b7280;   /* 薄墨 */
  --yamabuki:#d9a13b;  /* 山吹 */
  --wakakusa:#4f7a4a;  /* 若草 */
  --akane:#a8384a;     /* 茜 */
  --line:#ded4bd;
  --mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","Times New Roman",serif;
  --gothic:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--gothic);
  background:var(--kinari);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(23,50,74,.045), transparent 55%),
    radial-gradient(circle at 85% 80%, rgba(217,161,59,.07), transparent 50%);
  color:var(--sumi);
  min-height:100dvh;
  -webkit-text-size-adjust:100%;
}
.wrap{max-width:640px;margin:0 auto;padding:0 16px 96px}

/* ---------- ヘッダー ---------- */
header{
  padding:22px 0 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{
  font-family:var(--mincho);font-size:26px;margin:0;letter-spacing:.14em;color:var(--ai);font-weight:600;
}
.brand .sub{font-size:11px;color:var(--usuzumi);letter-spacing:.18em}
.whobtn{
  border:1px solid var(--line);background:var(--washi);border-radius:999px;
  padding:7px 14px;font-size:13px;color:var(--ai);font-family:var(--gothic);cursor:pointer;
  display:flex;align-items:center;gap:6px;font-weight:600;
}
.whobtn .dot{width:8px;height:8px;border-radius:50%;background:var(--yamabuki)}

/* ---------- タブ ---------- */
nav.tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:20px}
nav.tabs button{
  flex:1;background:none;border:none;padding:12px 4px;font-size:14px;font-weight:700;
  color:var(--usuzumi);font-family:var(--gothic);cursor:pointer;position:relative;letter-spacing:.06em;
}
nav.tabs button[aria-selected="true"]{color:var(--ai)}
nav.tabs button[aria-selected="true"]::after{
  content:"";position:absolute;left:0;right:0;bottom:-2px;height:3px;background:var(--ai);border-radius:2px;
}

/* ---------- カード ---------- */
.card{
  background:var(--washi);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:16px;
  box-shadow:0 1px 0 rgba(23,50,74,.04);
}
.card h2{
  font-family:var(--mincho);font-size:15px;margin:0 0 14px;letter-spacing:.14em;color:var(--ai);
  display:flex;align-items:center;gap:8px;font-weight:600;
}
.card h2::before{content:"";width:3px;height:15px;background:var(--yamabuki);border-radius:2px}

/* ---------- 選択チップ ---------- */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:10px 13px;
  font-size:14px;font-family:var(--gothic);color:var(--sumi);cursor:pointer;transition:.12s;font-weight:600;
}
.chip small{display:block;font-size:10px;color:var(--usuzumi);font-weight:400;margin-top:2px;letter-spacing:.04em}
.chip[aria-pressed="true"]{border-color:var(--ai);background:var(--ai);color:#fff}
.chip[aria-pressed="true"] small{color:rgba(255,255,255,.7)}
.chip:active{transform:scale(.97)}

.start{
  width:100%;padding:17px;border:none;border-radius:10px;background:var(--ai);color:#fff;
  font-size:17px;font-weight:700;font-family:var(--gothic);letter-spacing:.16em;cursor:pointer;
  box-shadow:0 3px 0 #0e2334;
}
.start:active{transform:translateY(2px);box-shadow:0 1px 0 #0e2334}
.start:disabled{background:#b6bcc4;box-shadow:none;cursor:default}

/* ---------- 短冊（問題札） ---------- */
.tanzaku{
  background:var(--washi);
  border:1px solid var(--line);
  border-top:5px solid var(--ai);
  border-radius:4px;
  padding:30px 20px;
  text-align:center;
  min-height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;
  box-shadow:0 2px 12px rgba(23,50,74,.07);
  position:relative;overflow:hidden;
}
.tanzaku::after{
  content:"";position:absolute;inset:6px;border:1px solid rgba(222,212,189,.75);border-radius:2px;pointer-events:none;
}
.qlabel{font-size:11px;letter-spacing:.24em;color:var(--usuzumi)}
.qtext{
  font-family:var(--mincho);font-size:27px;line-height:1.7;font-weight:600;color:var(--sumi);
  letter-spacing:.04em;word-break:auto-phrase;
}
.qtext.meaning{font-size:17px;line-height:1.9;font-weight:400;letter-spacing:.02em;text-align:left}
.blank{
  display:inline-block;min-width:1.3em;border-bottom:3px solid var(--ai);
  color:transparent;margin:0 .06em;
}
.blank.filled{color:var(--akane);border-bottom-color:var(--akane);animation:ink .45s ease-out}
@keyframes ink{from{opacity:0;transform:translateY(-6px) scale(.85)}to{opacity:1;transform:none}}

/* ---------- 進捗 ---------- */
.meter{display:flex;align-items:center;gap:10px;margin:0 0 14px;font-size:12px;color:var(--usuzumi)}
.bar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--ai);border-radius:3px;transition:width .3s}
.tally{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ai)}

/* ---------- 解答ボタン ---------- */
.opts{display:grid;gap:9px;margin-top:16px}
.opt{
  text-align:left;background:var(--washi);border:1.5px solid var(--line);border-radius:9px;
  padding:15px 15px;font-size:16px;font-family:var(--gothic);color:var(--sumi);cursor:pointer;
  display:flex;align-items:center;gap:12px;line-height:1.55;transition:.12s;
}
.opt .no{
  flex:none;width:24px;height:24px;border-radius:50%;background:var(--kinari);color:var(--ai);
  display:grid;place-items:center;font-size:12px;font-weight:700;border:1px solid var(--line);
}
.opt.wide{font-family:var(--mincho);font-size:18px;font-weight:600;letter-spacing:.03em}
.opt:active{transform:scale(.99)}
.opt.ok{border-color:var(--wakakusa);background:#eef5ec}
.opt.ok .no{background:var(--wakakusa);color:#fff;border-color:var(--wakakusa)}
.opt.ng{border-color:var(--akane);background:#fbeef0}
.opt.ng .no{background:var(--akane);color:#fff;border-color:var(--akane)}
.opt:disabled{cursor:default;opacity:.85}
.opt.ok:disabled,.opt.ng:disabled{opacity:1}

/* ---------- 解説 ---------- */
.answer{margin-top:16px;border-radius:9px;padding:16px;border:1px solid var(--line);background:var(--washi)}
.answer .verdict{font-size:14px;font-weight:700;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.answer.ok .verdict{color:var(--wakakusa)}
.answer.ng .verdict{color:var(--akane)}
.answer .full{font-family:var(--mincho);font-size:21px;font-weight:600;letter-spacing:.04em;margin-bottom:3px;color:var(--ai)}
.answer .yomi{font-size:12px;color:var(--usuzumi);margin-bottom:9px;letter-spacing:.06em}
.answer .mean{font-size:15px;line-height:1.8}
.next{
  margin-top:14px;width:100%;padding:15px;border:none;border-radius:9px;background:var(--ai);color:#fff;
  font-size:16px;font-weight:700;letter-spacing:.14em;font-family:var(--gothic);cursor:pointer;
}
.next:active{transform:translateY(1px)}

/* ---------- 結果 ---------- */
.score{text-align:center;padding:26px 10px}
.score .big{font-family:var(--mincho);font-size:56px;font-weight:600;color:var(--ai);line-height:1;font-variant-numeric:tabular-nums}
.score .big span{font-size:22px;color:var(--usuzumi)}
.score .msg{margin-top:12px;font-size:15px;font-weight:700;color:var(--sumi)}
.score .note{margin-top:6px;font-size:12px;color:var(--usuzumi)}
.reviewlist{display:grid;gap:9px}
.rev{border:1px solid var(--line);border-left:4px solid var(--akane);border-radius:7px;padding:12px 13px;background:var(--washi)}
.rev .k{font-family:var(--mincho);font-size:17px;font-weight:600;color:var(--ai)}
.rev .m{font-size:13px;color:var(--usuzumi);margin-top:4px;line-height:1.7}
.row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.ghost{
  padding:14px;border:1.5px solid var(--ai);border-radius:9px;background:transparent;color:var(--ai);
  font-size:15px;font-weight:700;font-family:var(--gothic);cursor:pointer;
}

/* ---------- 一覧 ---------- */
.search{
  width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:9px;background:var(--washi);
  font-size:15px;font-family:var(--gothic);margin-bottom:12px;color:var(--sumi);
}
.search:focus{outline:none;border-color:var(--ai)}
.item{border-bottom:1px solid var(--line);padding:13px 2px;display:flex;gap:11px;align-items:flex-start}
.item:last-child{border-bottom:none}
.item .badge{
  flex:none;margin-top:3px;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;font-size:11px;color:var(--usuzumi);background:#fff;
}
.item .badge.done{background:var(--yamabuki);border-color:var(--yamabuki);color:#fff}
.item .k{font-family:var(--mincho);font-size:17px;font-weight:600;letter-spacing:.03em}
.item .y{font-size:11px;color:var(--usuzumi);letter-spacing:.05em;margin-top:1px}
.item .m{font-size:13px;color:#4b5563;line-height:1.75;margin-top:5px}
.count{font-size:12px;color:var(--usuzumi);margin-bottom:8px}

/* ---------- 記録 ---------- */
.stat{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.stat:last-child{border-bottom:none}
.stat .l{font-size:14px;font-weight:600}
.stat .r{font-size:13px;color:var(--usuzumi);font-variant-numeric:tabular-nums}
.pbar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:7px}
.pbar i{display:block;height:100%;background:var(--yamabuki)}
.danger{background:none;border:none;color:var(--akane);font-size:13px;text-decoration:underline;cursor:pointer;padding:8px 0;font-family:var(--gothic)}

/* ---------- モーダル ---------- */
.mask{position:fixed;inset:0;background:rgba(32,36,43,.5);display:grid;place-items:center;padding:20px;z-index:50}
.modal{background:var(--washi);border-radius:12px;padding:22px;width:100%;max-width:380px}
.modal h3{font-family:var(--mincho);font-size:17px;margin:0 0 16px;letter-spacing:.1em;color:var(--ai)}
.users{display:grid;gap:8px;margin-bottom:14px}
.userbtn{
  padding:14px;border:1.5px solid var(--line);border-radius:9px;background:#fff;font-size:16px;font-weight:600;
  font-family:var(--gothic);cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;
}
.userbtn[aria-pressed="true"]{border-color:var(--ai);background:var(--ai);color:#fff}
.userbtn .x{font-size:12px;opacity:.55}
.addrow{display:flex;gap:8px}
.addrow input{flex:1;padding:12px;border:1.5px solid var(--line);border-radius:9px;font-size:15px;font-family:var(--gothic)}
.addrow input:focus{outline:none;border-color:var(--ai)}
.addrow button{padding:12px 16px;border:none;border-radius:9px;background:var(--ai);color:#fff;font-weight:700;cursor:pointer;font-family:var(--gothic)}
.close{width:100%;margin-top:14px;padding:12px;border:none;background:none;color:var(--usuzumi);font-size:14px;cursor:pointer;font-family:var(--gothic)}
.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:3px solid var(--yamabuki);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>ことわざ道場</h1>
      <span class="sub">語句の知識</span>
    </div>
    <button class="whobtn" id="whoBtn"><span class="dot"></span><span id="whoName">だれ？</span></button>
  </header>

  <nav class="tabs" role="tablist">
    <button role="tab" aria-selected="true" data-tab="home">いどむ</button>
    <button role="tab" aria-selected="false" data-tab="list">ことわざ一覧</button>
    <button role="tab" aria-selected="false" data-tab="rec">きろく</button>
  </nav>

  <!-- ===== ホーム ===== -->
  <section id="home">
    <div class="card">
      <h2>出題のしかた</h2>
      <div class="chips" id="modeChips">
        <button class="chip" data-mode="fill" aria-pressed="true">穴うめ<small>□に入る言葉は？</small></button>
        <button class="chip" data-mode="mean" aria-pressed="false">意味あて<small>ことわざ→意味</small></button>
        <button class="chip" data-mode="rev"  aria-pressed="false">逆引き<small>意味→ことわざ</small></button>
        <button class="chip" data-mode="mix"  aria-pressed="false">ごちゃまぜ<small>3つランダム</small></button>
      </div>
    </div>

    <div class="card">
      <h2>はんい</h2>
      <div class="chips" id="catChips"></div>
    </div>

    <div class="card">
      <h2>もんだい数</h2>
      <div class="chips" id="numChips">
        <button class="chip" data-num="10" aria-pressed="true">10問</button>
        <button class="chip" data-num="20" aria-pressed="false">20問</button>
        <button class="chip" data-num="30" aria-pressed="false">30問</button>
        <button class="chip" data-num="0"  aria-pressed="false">全部</button>
      </div>
      <div style="margin-top:14px" class="chips">
        <button class="chip" id="weakChip" aria-pressed="false">にがてだけ<small>まだマスターしていない問題</small></button>
      </div>
    </div>

    <button class="start" id="startBtn">はじめる</button>
  </section>

  <!-- ===== クイズ ===== -->
  <section id="quiz" class="hidden">
    <div class="meter">
      <span id="qNo">1 / 10</span>
      <span class="bar"><i id="qBar" style="width:0%"></i></span>
      <span class="tally" id="qTally">○0</span>
    </div>
    <div class="tanzaku">
      <div class="qlabel" id="qLabel">□に入る言葉は？</div>
      <div class="qtext" id="qText"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div id="answer"></div>
  </section>

  <!-- ===== 結果 ===== -->
  <section id="result" class="hidden">
    <div class="card">
      <div class="score">
        <div class="big" id="rScore">0<span>/10</span></div>
        <div class="msg" id="rMsg"></div>
        <div class="note" id="rNote"></div>
      </div>
    </div>
    <div class="card" id="reviewCard">
      <h2>まちがえたことわざ</h2>
      <div class="reviewlist" id="reviewList"></div>
    </div>
    <div class="row">
      <button class="ghost" id="againBtn">もう一度</button>
      <button class="start" id="homeBtn" style="box-shadow:0 3px 0 #0e2334">ホームへ</button>
    </div>
    <button class="ghost" id="retryWrongBtn" style="width:100%;margin-top:9px">まちがえた分だけやり直す</button>
  </section>

  <!-- ===== 一覧 ===== -->
  <section id="list" class="hidden">
    <input class="search" id="searchBox" placeholder="ことわざ・意味・言葉でさがす">
    <div class="chips" id="listCats" style="margin-bottom:14px"></div>
    <div class="count" id="listCount"></div>
    <div class="card" id="listBox"></div>
  </section>

  <!-- ===== きろく ===== -->
  <section id="rec" class="hidden">
    <div class="card">
      <h2>マスターぐあい</h2>
      <div id="recStats"></div>
    </div>
    <div class="card">
      <h2>にがてトップ10</h2>
      <div id="recWeak"></div>
    </div>
    <button class="danger" id="resetBtn">このお子さまの記録をぜんぶ消す</button>
  </section>
</div>

<!-- ===== ユーザー選択 ===== -->
<div class="mask hidden" id="userMask">
  <div class="modal">
    <h3>だれがやる？</h3>
    <div class="users" id="userList"></div>
    <div class="addrow">
      <input id="newUser" placeholder="なまえを入れる" maxlength="8">
      <button id="addUser">ふやす</button>
    </div>
    <button class="close" id="closeUser">とじる</button>
  </div>
</div>

<script>
/* =======================================================
   データ  [ことわざ, □にする言葉, 意味, 分類, よみ]
   分類 0:動物 1:植物 2:数字 3:くらし・その他
   ======================================================= */
const RAW = [
/* --- 動物 --- */
["虻蜂取らず","虻","二つとも手に入れようと欲ばって、結局どちらも得られないこと。",0,"あぶはちとらず"],
["蟻の穴から堤も崩れる","蟻","小さな油断や不注意が、大きな失敗をまねくということ。",0,"ありのあなからつつみもくずれる"],
["犬も歩けば棒に当たる","犬","何かをしていると、思いがけない幸運や災難に出会うということ。",0,""],
["井の中の蛙大海を知らず","蛙","せまい知識にとらわれて、広い世間を知らないことのたとえ。",0,"いのなかのかわずたいかいをしらず"],
["馬の耳に念仏","馬","いくら忠告しても、まったく効き目がないこと。",0,"うまのみみにねんぶつ"],
["木に縁りて魚を求む","魚","方法がまちがっているため、目的が達成できないこと。",0,"きによりてうおをもとむ"],
["豚に真珠","豚","値打ちのあるものも、それがわからない人には役に立たないこと。",0,"ぶたにしんじゅ"],
["鳶が鷹を生む","鳶","平凡な親から、すぐれた子が生まれること。",0,"とんびがたかをうむ"],
["二兎を追う者は一兎をも得ず","二兎","欲ばって二つをねらうと、どちらも手に入らないこと。",0,"にとをおうものはいっとをもえず"],
["猫に小判","猫","貴重なものも、価値のわからない人にはむだであること。",0,"ねこにこばん"],
["月とすっぽん","すっぽん","二つのものの違いが、あまりにも大きいことのたとえ。",0,""],
["犬に論語","犬","道理を説いても、わからない相手には何にもならないこと。",0,"いぬにろんご"],
["海老で鯛を釣る","鯛","わずかな元手や労力で、大きな利益を得ること。",0,"えびでたいをつる"],
["蛙の面に水","蛙","何をされても平気でいることのたとえ。",0,"かえるのつらにみず"],
["河童の川流れ","河童","名人でも、時には失敗することがあるということ。",0,"かっぱのかわながれ"],
["雉も鳴かずば撃たれまい","雉","余計なことを言わなければ、災いをまねかずにすんだということ。",0,"きじもなかずばうたれまい"],
["亀の甲より年の功","亀","長年つんだ経験は、とうといものだということ。",0,"かめのこうよりとしのこう"],
["捕らぬ狸の皮算用","狸","手に入るかどうかわからないうちから、あてにして計画を立てること。",0,"とらぬたぬきのかわざんよう"],
["柳の下にいつも泥鰌はいない","泥鰌","一度うまくいっても、同じ方法がいつも通用するとはかぎらないこと。",0,"やなぎのしたにいつもどじょうはいない"],
["泣き面に蜂","蜂","不運の上に、さらに不運が重なること。",0,"なきつらにはち"],
["魚心あれば水心","魚心","相手が好意を示せば、こちらも応じる気持ちがあるということ。",0,"うおごころあればみずごころ"],
["牛に引かれて善光寺参り","牛","思いがけないきっかけで、よい方向に導かれること。",0,"うしにひかれてぜんこうじまいり"],
["飼い犬に手を噛まれる","犬","面倒をみていた者に裏切られること。",0,"かいいぬにてをかまれる"],
["蛙の子は蛙","蛙","子は親に似るもので、平凡な親からは平凡な子が生まれるということ。",0,"かえるのこはかえる"],
["立つ鳥跡を濁さず","鳥","立ち去る者は、あとをきれいに始末していくべきだということ。",0,"たつとりあとをにごさず"],
["猿も木から落ちる","猿","どんな名人でも、失敗することがあるということ。",0,"さるもきからおちる"],

const KEY="kotowaza_dojo_v1";
let S={users:{},cur:null};
function load(){try{const r=localStorage.getItem(KEY);if(r)S=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function stats(){if(!S.cur)return{};if(!S.users[S.cur])S.users[S.cur]={st:{}};return S.users[S.cur].st;}
function rec(id,ok){
  const st=stats(); const s=st[id]||(st[id]={o:0,x:0,k:0});
  if(ok){s.o++;s.k++;}else{s.x++;s.k=0;}
  save();
}
const mastered=id=>{const s=stats()[id];return !!s&&s.k>=2;};

/* =======================================================
   画面まわり
   ======================================================= */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const SEC={home:$("#home"),quiz:$("#quiz"),result:$("#result"),list:$("#list"),rec:$("#rec")};
function show(name){Object.entries(SEC).forEach(([k,el])=>el.classList.toggle("hidden",k!==name));}
function tab(name){
  $$("nav.tabs button").forEach(b=>b.setAttribute("aria-selected",b.dataset.tab===name));
  if(name==="list"){renderList();show("list");}
  else if(name==="rec"){renderRec();show("rec");}
  else show("home");
}
$$("nav.tabs button").forEach(b=>b.onclick=()=>tab(b.dataset.tab));

/* --- 分類チップ --- */
const catChips=$("#catChips");
catChips.innerHTML=`<button class="chip" data-cat="all" aria-pressed="true">ぜんぶ<small>${DB.length}語</small></button>`+
  CATS.map((c,i)=>`<button class="chip" data-cat="${i}" aria-pressed="false">${c}<small>${DB.filter(d=>d.c===i).length}語</small></button>`).join("");
function pickGroup(sel,attr){
  $$(sel+" .chip").forEach(b=>b.onclick=()=>{
    $$(sel+" .chip").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
  });
}
pickGroup("#modeChips");pickGroup("#catChips");pickGroup("#numChips");
$("#weakChip").onclick=e=>{const b=e.currentTarget;b.setAttribute("aria-pressed",b.getAttribute("aria-pressed")!=="true");};
const chosen=sel=>$(sel+' .chip[aria-pressed="true"]');

/* =======================================================
   ユーザー
   ======================================================= */
function renderUsers(){
  const names=Object.keys(S.users);
  $("#userList").innerHTML = names.length? names.map(n=>
    `<button class="userbtn" data-n="${n}" aria-pressed="${n===S.cur}">${n}<span class="x" data-del="${n}">けす</span></button>`
  ).join("") : `<div style="font-size:13px;color:var(--usuzumi);line-height:1.7">まだ登録がありません。<br>下になまえを入れてください。</div>`;
  $$("#userList .userbtn").forEach(b=>b.onclick=e=>{
    if(e.target.dataset.del){
      if(confirm(e.target.dataset.del+" の記録を消します。よろしいですか？")){
        delete S.users[e.target.dataset.del];
        if(S.cur===e.target.dataset.del)S.cur=Object.keys(S.users)[0]||null;
        save();renderUsers();paintWho();
      }
      return;
    }
    S.cur=b.dataset.n;save();renderUsers();paintWho();$("#userMask").classList.add("hidden");
  });
  $("#whoName").textContent=S.cur||"だれ？";
}
function paintWho(){$("#whoName").textContent=S.cur||"だれ？";}
$("#whoBtn").onclick=()=>{renderUsers();$("#userMask").classList.remove("hidden");};
$("#closeUser").onclick=()=>$("#userMask").classList.add("hidden");
$("#addUser").onclick=()=>{
  const v=$("#newUser").value.trim();if(!v)return;
  if(!S.users[v])S.users[v]={st:{}};
  S.cur=v;$("#newUser").value="";save();renderUsers();paintWho();
};
$("#newUser").addEventListener("keydown",e=>{if(e.key==="Enter")$("#addUser").click();});

/* =======================================================
   出題
   ======================================================= */
let Q=[],idx=0,ok=0,wrong=[],lastSetup=null;
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};

function buildPool(){
  const c=chosen("#catChips").dataset.cat;
  let pool=c==="all"?DB.slice():DB.filter(d=>d.c===+c);
  if($("#weakChip").getAttribute("aria-pressed")==="true"){
    const w=pool.filter(d=>!mastered(d.id));
    if(w.length>=4)pool=w;
  }
  return pool;
}
function start(setup){
  lastSetup=setup||null;
  let pool = setup ? setup : buildPool();
  if(!pool.length)return;
  if(!setup && pool.length<4){alert("この条件では問題が足りません。はんいを広げてください。");return;}
  const n=+chosen("#numChips").dataset.num;
  const mode=chosen("#modeChips").dataset.mode;
  Q=shuffle(pool.slice());
  if(n>0)Q=Q.slice(0,Math.min(n,Q.length));
  Q=Q.map(d=>({d,mode:mode==="mix"?["fill","mean","rev"][Math.random()*3|0]:mode}));
  idx=0;ok=0;wrong=[];
  show("quiz");render();
}
$("#startBtn").onclick=()=>{
  if(!S.cur){renderUsers();$("#userMask").classList.remove("hidden");return;}
  start(null);
};

function distract(d,mode,pool){
  const same=pool.filter(x=>x.c===d.c&&x.id!==d.id);
  const rest=pool.filter(x=>x.c!==d.c&&x.id!==d.id);
  const src=shuffle(same.slice()).concat(shuffle(rest.slice()));
  const key=mode==="fill"?"b":(mode==="mean"?"m":"f");
  const out=[],used=new Set([d[key]]);
  for(const x of src){if(used.has(x[key]))continue;used.add(x[key]);out.push(x);if(out.length===3)break;}
  return out;
}

function render(){
  const {d,mode}=Q[idx];
  $("#qNo").textContent=`${idx+1} / ${Q.length}`;
  $("#qBar").style.width=(idx/Q.length*100)+"%";
  $("#qTally").textContent="○"+ok;
  $("#answer").innerHTML="";

  const qt=$("#qText");
  qt.classList.toggle("meaning",mode==="rev");
  if(mode==="fill"){
    $("#qLabel").textContent="□に入る言葉は？";
    qt.innerHTML=d.q.replace("§",`<span class="blank" id="bl">${d.b}</span>`);
  }else if(mode==="mean"){
    $("#qLabel").textContent="このことわざの意味は？";
    qt.textContent=d.f;
  }else{
    $("#qLabel").textContent="この意味のことわざは？";
    qt.textContent=d.m;
  }

  const pool=buildPool().length>=8?buildPool():DB;
  const key=mode==="fill"?"b":(mode==="mean"?"m":"f");
  const cards=shuffle([d,...distract(d,mode,pool)]);
  const wide=(mode==="mean"||mode==="rev");
  $("#opts").innerHTML=cards.map((x,i)=>
    `<button class="opt ${mode==="rev"?"wide":""}" data-i="${i}"><span class="no">${"アイウエ"[i]}</span><span>${x[key]}</span></button>`
  ).join("");
  $$("#opts .opt").forEach((b,i)=>b.onclick=()=>judge(cards[i].id===d.id,i,cards,d,mode));
}

function judge(correct,pick,cards,d,mode){
  $$("#opts .opt").forEach((b,i)=>{
    b.disabled=true;
    if(cards[i].id===d.id)b.classList.add("ok");
    else if(i===pick)b.classList.add("ng");
  });
  if(mode==="fill"){const bl=$("#bl");if(bl)bl.classList.add("filled");}
  if(correct){ok++;}else{wrong.push(d);}
  rec(d.id,correct);
  $("#qTally").textContent="○"+ok;

  $("#answer").innerHTML=`
    <div class="answer ${correct?"ok":"ng"}">
      <div class="verdict">${correct?"◎ せいかい":"× ざんねん"}</div>
      <div class="full">${d.f}</div>
      ${d.y?`<div class="yomi">${d.y}</div>`:""}
      <div class="mean">${d.m}</div>
    </div>
    <button class="next" id="nextBtn">${idx+1<Q.length?"つぎへ":"けっかを見る"}</button>`;
  $("#nextBtn").onclick=()=>{idx++;idx<Q.length?render():finish();};
  $("#nextBtn").focus({preventScroll:true});
}

function finish(){
  const pct=Math.round(ok/Q.length*100);
  $("#rScore").innerHTML=`${ok}<span>/${Q.length}</span>`;
  $("#rMsg").textContent = pct===100?"全問正解！みごとです":pct>=80?"よくできました":pct>=50?"あと一息、復習しよう":"まずは一覧を読んでみよう";
  $("#rNote").textContent=`正答率 ${pct}％ ／ ${S.cur} さん`;
  $("#reviewCard").classList.toggle("hidden",wrong.length===0);
  $("#reviewList").innerHTML=wrong.map(d=>
    `<div class="rev"><div class="k">${d.f}</div>${d.y?`<div class="m">${d.y}</div>`:""}<div class="m">${d.m}</div></div>`).join("");
  $("#retryWrongBtn").classList.toggle("hidden",wrong.length===0);
  show("result");
}
$("#againBtn").onclick=()=>start(lastSetup);
$("#homeBtn").onclick=()=>{show("home");tab("home");};
$("#retryWrongBtn").onclick=()=>{const w=wrong.slice();start(w);};

/* =======================================================
   一覧
   ======================================================= */
let listCat="all";
$("#listCats").innerHTML=`<button class="chip" data-cat="all" aria-pressed="true">ぜんぶ</button>`+
  CATS.map((c,i)=>`<button class="chip" data-cat="${i}" aria-pressed="false">${c}</button>`).join("");
$$("#listCats .chip").forEach(b=>b.onclick=()=>{
  $$("#listCats .chip").forEach(x=>x.setAttribute("aria-pressed","false"));
  b.setAttribute("aria-pressed","true");listCat=b.dataset.cat;renderList();
});
$("#searchBox").addEventListener("input",renderList);
function renderList(){
  const kw=$("#searchBox").value.trim();
  let d=DB.filter(x=>listCat==="all"||x.c===+listCat);
  if(kw)d=d.filter(x=>x.f.includes(kw)||x.m.includes(kw)||x.y.includes(kw)||x.b.includes(kw));
  $("#listCount").textContent=`${d.length}語　（●＝マスター済み）`;
  $("#listBox").innerHTML=d.length? d.map(x=>
    `<div class="item"><span class="badge ${mastered(x.id)?"done":""}">${mastered(x.id)?"●":""}</span>
      <div><div class="k">${x.f}</div>${x.y?`<div class="y">${x.y}</div>`:""}<div class="m">${x.m}</div></div></div>`
  ).join("") : `<div style="padding:20px 0;color:var(--usuzumi);font-size:14px">見つかりませんでした。ちがう言葉でさがしてみてください。</div>`;
}

/* =======================================================
   きろく
   ======================================================= */
function renderRec(){
  if(!S.cur){$("#recStats").innerHTML=`<div style="font-size:14px;color:var(--usuzumi)">右上からお子さまを選んでください。</div>`;$("#recWeak").innerHTML="";return;}
  const st=stats();
  $("#recStats").innerHTML=[["ぜんぶ",DB]].concat(CATS.map((c,i)=>[c,DB.filter(d=>d.c===i)])).map(([n,arr])=>{
    const m=arr.filter(d=>mastered(d.id)).length;
    const p=Math.round(m/arr.length*100);
    return `<div class="stat"><div style="flex:1"><div class="l">${n}</div><div class="pbar"><i style="width:${p}%"></i></div></div><div class="r" style="margin-left:14px">${m}/${arr.length}　${p}%</div></div>`;
  }).join("");
  const weak=DB.map(d=>({d,s:st[d.id]})).filter(o=>o.s&&o.s.x>0)
    .sort((a,b)=>b.s.x-a.s.x||a.s.o-b.s.o).slice(0,10);
  $("#recWeak").innerHTML=weak.length? weak.map(o=>
    `<div class="stat"><div class="l" style="font-family:var(--mincho);font-size:16px">${o.d.f}</div><div class="r">×${o.s.x}　○${o.s.o}</div></div>`
  ).join("") : `<div style="font-size:14px;color:var(--usuzumi)">まだ記録がありません。まずは10問やってみましょう。</div>`;
}
$("#resetBtn").onclick=()=>{
  if(!S.cur)return;
  if(confirm(S.cur+" さんの記録をすべて消します。よろしいですか？")){S.users[S.cur]={st:{}};save();renderRec();}
};

/* ===== 起動 ===== */
load();
if(!S.cur)S.cur=Object.keys(S.users)[0]||null;
paintWho();renderList();
if(!S.cur){renderUsers();$("#userMask").classList.remove("hidden");}
</script>
</body>
</html>
