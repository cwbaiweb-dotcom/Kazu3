<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>べんきょうアプリ</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#EEF1F4">
<style>
  :root{
    --paper:#EEF1F4;
    --grid:#DDE4EA;
    --ink:#1F2933;
    --ink-soft:#69747E;
    --card:#FFFFFF;
    --kokugo:#D2452F;
    --sansu:#2B6CB0;
    --rika:#2C7A56;
    --shakai:#B57F00;
    --sonota:#6B5B95;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Yu Gothic",
                "Noto Sans JP",system-ui,sans-serif;
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
    min-height:100vh;
    padding:32px 20px 64px;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:760px;margin:0 auto}

  header{margin-bottom:28px;padding-left:4px}
  .eyebrow{
    font-size:12px;letter-spacing:.22em;color:var(--ink-soft);
    font-weight:700;margin-bottom:6px;
  }
  h1{font-size:30px;font-weight:800;letter-spacing:.04em}
  .sub{margin-top:8px;font-size:13.5px;color:var(--ink-soft)}

  .list{display:grid;gap:12px;margin-top:24px}

  /* カード＝ノートのインデックスシール */
  .app{
    display:flex;align-items:stretch;
    background:var(--card);
    border-radius:4px;
    text-decoration:none;color:inherit;
    box-shadow:0 1px 0 rgba(31,41,51,.12), 0 2px 8px rgba(31,41,51,.06);
    overflow:hidden;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .app:hover,.app:focus-visible{
    transform:translateY(-2px);
    box-shadow:0 2px 0 rgba(31,41,51,.14), 0 8px 18px rgba(31,41,51,.10);
  }
  .app:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  .app:active{transform:translateY(0)}

  .tab{
    flex:0 0 74px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:15px;letter-spacing:.12em;
    writing-mode:horizontal-tb;
  }
  .body{padding:16px 18px;flex:1;min-width:0}
  .name{font-size:17.5px;font-weight:700;line-height:1.4}
  .note{font-size:13px;color:var(--ink-soft);margin-top:5px;line-height:1.6}
  .arrow{
    align-self:center;padding:0 18px 0 8px;
    color:var(--ink-soft);font-size:20px;flex:0 0 auto;
  }

  .kokugo .tab{background:var(--kokugo)}
  .sansu  .tab{background:var(--sansu)}
  .rika   .tab{background:var(--rika)}
  .shakai .tab{background:var(--shakai)}
  .sonota .tab{background:var(--sonota)}

  footer{
    margin-top:36px;padding-left:4px;
    font-size:12px;color:var(--ink-soft);line-height:1.8;
  }

  @media (max-width:480px){
    body{padding:24px 14px 48px}
    h1{font-size:25px}
    .tab{flex-basis:60px;font-size:14px}
    .name{font-size:16px}
  }
  @media (prefers-reduced-motion:reduce){
    .app{transition:none}
    .app:hover{transform:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">2027 じゅけん</div>
    <h1>べんきょうアプリ</h1>
    <p class="sub">やりたいものをタップしてね。とちゅうまでの記録はそのタブレット／パソコンに残ります。</p>
  </header>

  <!-- ============================================================
       ▼ アプリを追加するときは、この <a> ブロックを1つコピーして
         ① class の 2つめ（kokugo / sansu / rika / shakai / sonota）
         ② href のファイル名
         ③ tab の教科名 / name のタイトル / note の説明
         を書きかえるだけです。並び順＝表示順です。
       ============================================================ -->
  <div class="list">

    <a class="app shakai" href="歴史年代クイズ.html">
      <div class="tab">社会</div>
      <div class="body">
        <div class="name">歴史年号クイズ</div>
        <div class="note">重要な年号を、おぼえるまでくりかえし出題</div>
      </div>
      <div class="arrow" aria-hidden="true">›</div>
    </a>

    <a class="app shakai" href="kogyo-toshi.html">
      <div class="tab">社会</div>
      <div class="body">
        <div class="name">工業都市・高速道路・新幹線</div>
        <div class="note">地図とセットでおぼえる一問一答</div>
      </div>
      <div class="arrow" aria-hidden="true">›</div>
    </a>

    <a class="app kokugo" href="外来語ドリル.html">
      <div class="tab">国語</div>
      <div class="body">
        <div class="name">外来語ドリル</div>
        <div class="note">入試によく出る外来語をチェック</div>
      </div>
      <div class="arrow" aria-hidden="true">›</div>
    </a>

    <a class="app rika" href="shokubutsu-card.html">
      <div class="tab">理科</div>
      <div class="body">
        <div class="name">植物カード</div>
        <div class="note">イラストで見わけるポイントを確認</div>
      </div>
      <div class="arrow" aria-hidden="true">›</div>
    </a>

  </div>

  <footer>
    このページはこの家のためのものです。<br>
    調子がわるいときは、いったん閉じてもう一度ひらいてみてください。
  </footer>

</div>
</body>
</html>
