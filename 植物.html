<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>植物クイズ｜中学受験 理科</title>
<style>
  :root{
    --paper:#F1F4EA; --paper2:#FBFCF7; --ink:#1E2A21; --ink60:#5A6A5C;
    --line:#CBD6C0; --leaf:#3F7D53; --leafLt:#E3EEDF; --petal:#8C5A9E;
    --seed:#B98A2E; --wrong:#B4483C; --wrongLt:#F7E6E3;
    --serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP",serif;
    --sans:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
       -webkit-text-size-adjust:100%;line-height:1.6}
  #app{max-width:560px;margin:0 auto;padding:20px 16px 60px}
  h1,h2{font-family:var(--serif);font-weight:600;margin:0}
  button{font-family:var(--sans);cursor:pointer}
  button:focus-visible,input:focus-visible{outline:2px solid var(--leaf);outline-offset:2px}
  .panel{border:1px solid var(--line);border-radius:10px;background:var(--paper2);padding:16px}
  .eyebrow{font-size:11px;letter-spacing:.18em;color:var(--ink60)}
  .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--leaf);transition:width .35s ease}
  .row{display:flex;align-items:center;gap:10px;width:100%;border:1px solid var(--line);
       border-radius:8px;padding:10px 12px;text-align:left;background:transparent}
  .box{width:14px;height:14px;border-radius:4px;flex:0 0 auto;border:2px solid var(--line);background:transparent}
  .pill{border:1px solid var(--line);border-radius:999px;padding:6px 14px;font-size:13px;background:transparent;color:var(--ink)}
  .pill.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .primary{width:100%;padding:14px 0;border-radius:8px;border:none;background:var(--ink);
           color:var(--paper);font-size:15px;letter-spacing:.08em}
  .secondary{width:100%;padding:12px 0;border-radius:8px;border:1px solid var(--line);
             background:transparent;color:var(--ink);font-size:14px}
  .primary[disabled],.secondary[disabled]{opacity:.4;cursor:default}
  .choice{display:flex;align-items:center;width:100%;text-align:left;border:1px solid var(--line);
          border-radius:8px;padding:13px 14px;font-size:14.5px;line-height:1.5;background:transparent;color:var(--ink)}
  .link{border:none;background:transparent;color:var(--ink60);font-size:12.5px}
  .tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;letter-spacing:.06em;
       background:var(--leafLt);color:var(--leaf)}
  .stack{display:grid;gap:8px}
  .nameinput{border:none;border-bottom:1px dashed var(--line);background:transparent;font-size:15px;
             font-family:var(--serif);color:var(--ink);width:130px;padding:2px 0}
  .num{font-variant-numeric:tabular-nums}
  .find{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .find a{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:12px;
          border:1px solid var(--line);border-radius:999px;padding:5px 11px;
          color:var(--ink60);background:var(--paper2)}
  .find a:hover{border-color:var(--leaf);color:var(--leaf)}
  .find .kw{font-size:11px;color:var(--ink60);align-self:center;opacity:.8}
  .mini{width:54px}
  .mini .bar{height:4px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"></div>

function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function buildBank(){
  const Q=[];
  FAMILIES.forEach(f=>{
    f.members.slice(0,6).forEach(m=>{
      const others=shuffle(FAMILIES.filter(x=>x.key!==f.key)).slice(0,3).map(x=>x.name);
      Q.push({id:"fam_"+f.key+"_"+m,cat:"family",prompt:"「"+m+"」は何のなかまですか。",
        choices:shuffle([f.name].concat(others)),answers:[f.name],kw:m+" 花",
        exp:m+" は "+f.name+"（"+groupLabel(f)+"）。"+f.note});
    });
  });
  FAMILIES.forEach(f=>{
    const correct=shuffle(f.members).slice(0,3);
    const pool=[].concat.apply([],FAMILIES.filter(x=>x.key!==f.key).map(x=>x.members));
    const wrong=shuffle(pool).slice(0,3);
    Q.push({id:"mem_"+f.key,cat:"member",multi:true,
      prompt:f.name+"の植物を すべて 選びなさい。",
      choices:shuffle(correct.concat(wrong)),answers:correct,kw:f.name+" 植物",
      exp:f.name+"："+f.members.join("・")});
  });
  FAMILIES.forEach(f=>{
    Q.push({id:"grp_"+f.key,cat:"group",prompt:f.name+"は次のどれにあてはまりますか。",
      choices:GROUP_CHOICES.slice(),answers:[groupLabel(f)],kw:f.name+" "+groupLabel(f),
      exp:f.name+" → "+groupLabel(f)+"。"+f.note});
    if(f.group!=="裸子植物"){
      const m=f.members[0], tan=f.group==="単子葉類";
      Q.push({id:"grp2_"+f.key,cat:"group",
        prompt:"「"+m+"」の葉脈と根のようすの正しい組み合わせはどれですか。",
        choices:shuffle(["平行脈・ひげ根","網状脈・主根と側根","平行脈・主根と側根","網状脈・ひげ根"]),
        answers:[tan?"平行脈・ひげ根":"網状脈・主根と側根"],kw:(tan?"平行脈 ひげ根":"網状脈 主根 側根")+" 図",
        exp:m+"は"+f.group+"。"+(tan?"単子葉類は 子葉1枚・平行脈・ひげ根・維管束は散在。":"双子葉類は 子葉2枚・網状脈・主根と側根・維管束は輪状。")});
    }
  });
  FAMILIES.forEach(f=>{
    const tansei=f.sex.indexOf("単性")===0;
    Q.push({id:"sex_"+f.key,cat:"sex",
      prompt:f.name+"（"+f.members[0]+"）の花は 単性花・両性花 のどちらですか。",
      choices:["単性花","両性花"],answers:[tansei?"単性花":"両性花"],kw:f.members[0]+" "+(tansei?"お花 め花":"花のつくり"),
      exp:f.name+" … "+f.sex+"。単性花のなかまは「ウリ科・トウモロコシ・裸子植物（マツ・イチョウ）」。"});
  });
  const PL={petal:"花びら",stamen:"おしべ"};
  const pool=["0（花びらなし）","0（がくなし）","3","4","5","6","10","多数（約30〜40本）","5（お花）","4（2本長く2本短い）","5（シャクナゲは10）","5（くっついて1枚に見える）"];
  FAMILIES.forEach(f=>{
    ["petal","stamen"].forEach(p=>{
      const ans=f.parts[p]; if(ans==="—")return;
      const wrong=shuffle(pool.filter(x=>x!==ans)).slice(0,3);
      Q.push({id:"part_"+f.key+"_"+p,cat:"parts",
        prompt:f.name+"（"+f.members[0]+"）の花の "+PL[p]+" の数はいくつですか。",
        choices:shuffle([ans].concat(wrong)),answers:[ans],kw:f.members[0]+" 花のつくり 図",
        exp:f.name+"｜花びら "+f.parts.petal+"／がく "+f.parts.sepal+"／おしべ "+f.parts.stamen+"／めしべ "+f.parts.pistil});
    });
  });
  FACTS.forEach((r,i)=>{
    const ans=r[2][r[3]];
    const bare=ans.replace(/（.*?）/g,"").trim();
    // 答えが長い文のときは単元名で調べる
    const kw=(bare.length<=8?bare:r[0])+" 理科 小学生";
    Q.push({id:"fact_"+i,cat:r[0],prompt:r[1],choices:shuffle(r[2]),answers:[ans],kw:kw,exp:r[4]});
  });
  return Q;
}

/* ---------- 6. 出題ロジック ---------- */
function makeQueue(mode){
  let pool=BANK.filter(q=>S.selCats.indexOf(q.cat)>=0);
  if(mode==="review"){
    pool=pool.filter(q=>{const p=S.prog[q.id];return p&&p.ng>0&&p.lv<MAX_LV;});
  }
  const scored=pool.map(q=>{
    const p=S.prog[q.id]||{lv:0,ng:0};
    return {q,w:(MAX_LV+1-p.lv)*10+p.ng*6+Math.random()*9};
  });
  scored.sort((a,b)=>b.w-a.w);
  const n=S.len===0?pool.length:Math.min(S.len,pool.length);
  return scored.slice(0,n).map(s=>s.q);
}
function start(mode){
  const q=makeQueue(mode); if(!q.length)return;
  S.queue=q;S.idx=0;S.picked=[];S.judged=false;S.log=[];S.screen="quiz";render();
}
function isCorrect(){
  const c=S.queue[S.idx];
  return S.picked.length===c.answers.length && S.picked.every(p=>c.answers.indexOf(p)>=0);
}
function judge(){
  if(!S.picked.length||S.judged)return;
  const c=S.queue[S.idx], ok=isCorrect();
  const p=S.prog[c.id]||{lv:0,ok:0,ng:0};
  S.prog[c.id]= ok ? {lv:Math.min(MAX_LV,p.lv+1),ok:p.ok+1,ng:p.ng}
                   : {lv:0,ok:p.ok,ng:p.ng+1};
  saveProg(); S.log.push({id:c.id,ok:ok}); S.judged=true; render();
}
function next(){
  if(S.idx+1>=S.queue.length){S.screen="result";}
  else {S.idx++;S.picked=[];S.judged=false;}
  render();
}
function reviewCount(){
  return BANK.filter(q=>{
    if(S.selCats.indexOf(q.cat)<0)return false;
    const p=S.prog[q.id]; return p&&p.ng>0&&p.lv<MAX_LV;
  }).length;
}
function catStat(id){
  const qs=BANK.filter(q=>q.cat===id);
  return {total:qs.length, mastered:qs.filter(q=>(S.prog[q.id]||{lv:0}).lv>=MAX_LV).length};
}

    const sel=S.picked.indexOf(ch)>=0, isAns=c.answers.indexOf(ch)>=0;
    let bg="transparent",bd="var(--line)",fg="var(--ink)";
    if(S.judged){
      if(isAns){bg="var(--leafLt)";bd="var(--leaf)";}
      else if(sel){bg="var(--wrongLt)";bd="var(--wrong)";fg="var(--wrong)";}
    } else if(sel){bg="var(--paper2)";bd="var(--ink)";}
    const mark=(sel||(S.judged&&isAns))?bd:"var(--line)";
    return '<button class="choice" data-ch="'+i+'" style="background:'+bg+';border-color:'+bd+';color:'+fg+'">'+
      (c.multi?'<span class="box" style="margin-right:10px;border-color:'+mark+';background:'+((sel||(S.judged&&isAns))?bd:"transparent")+'"></span>':'')+
      '<span>'+esc(ch)+'</span>'+
      (S.judged&&isAns?'<span style="margin-left:auto;color:var(--leaf);font-size:13px">正解</span>':'')+
    '</button>';
  }).join("")+'</div>'+
  (S.judged?
    '<div class="panel" style="margin-top:14px;border-color:'+(ok?"var(--leaf)":"var(--wrong)")+';background:'+(ok?"var(--leafLt)":"var(--wrongLt)")+'">'+
      '<div style="font-family:var(--serif);font-size:17px;color:'+(ok?"var(--leaf)":"var(--wrong)")+';margin-bottom:6px">'+(ok?"○ せいかい":"× ざんねん")+'</div>'+
      '<p style="font-size:13.5px;line-height:1.85;margin:0">'+esc(c.exp)+'</p>'+
      findLinks(c)+
    '</div>':'')+
  '<div style="margin-top:16px">'+
    (S.judged
      ? '<button class="primary" id="next">'+(S.idx+1>=S.queue.length?"けっかを見る":"つぎの問題 →")+'</button>'
      : '<button class="primary" id="judge"'+(S.picked.length?"":" disabled")+'>こたえあわせ</button>')+
  '</div>';
  document.getElementById("quit").addEventListener("click",()=>{S.screen="home";render();});
  app.querySelectorAll("[data-ch]").forEach(el=>el.addEventListener("click",()=>{
    if(S.judged)return;
    const ch=c.choices[+el.dataset.ch];
    if(c.multi){const i=S.picked.indexOf(ch); if(i>=0)S.picked.splice(i,1); else S.picked.push(ch);}
    else S.picked=[ch];
    render();
  }));
  const j=document.getElementById("judge"); if(j)j.addEventListener("click",judge);
  const n=document.getElementById("next");  if(n)n.addEventListener("click",next);
}

/* --- 結果 --- */
function renderResult(){
  const right=S.log.filter(l=>l.ok).length;
  const wrongs=S.log.filter(l=>!l.ok).map(l=>BYID[l.id]);
  app.innerHTML=
  '<div style="text-align:center;padding:28px 0 8px">'+LEAF+
    '<div style="font-family:var(--serif);font-size:44px;margin-top:6px">'+right+
      '<span style="font-size:18px;color:var(--ink60)"> / '+S.log.length+'</span></div>'+
    '<p style="color:var(--ink60);font-size:13px;margin:4px 0 0">'+
      (right===S.log.length?"全問正解！すばらしい":"まちがえた "+(S.log.length-right)+" 問は「まちがい直し」に入りました")+'</p>'+
  '</div>'+
  (wrongs.length?
    '<div class="eyebrow" style="margin:18px 0 8px">まちがえた問題</div><div class="stack">'+
    wrongs.map(q=>'<div class="panel" style="padding:14px">'+
      '<p style="font-family:var(--serif);font-size:15px;margin:0 0 6px">'+esc(q.prompt)+'</p>'+
      '<p style="font-size:13px;color:var(--leaf);margin:0 0 6px">こたえ：'+esc(q.answers.join(" ・ "))+'</p>'+
      '<p style="font-size:12.5px;color:var(--ink60);line-height:1.8;margin:0">'+esc(q.exp)+'</p>'+
      findLinks(q)+'</div>').join("")+
    '</div>':'')+
  '<div class="stack" style="gap:10px;margin-top:22px">'+
    '<button class="primary" id="again">もう一度</button>'+
    (wrongs.length?'<button class="secondary" id="rev">まちがい直しをする</button>':'')+
    '<button class="secondary" id="home">ホームへ</button>'+
  '</div>';
  document.getElementById("again").addEventListener("click",()=>start("normal"));
  const r=document.getElementById("rev"); if(r)r.addEventListener("click",()=>start("review"));
  document.getElementById("home").addEventListener("click",()=>{S.screen="home";render();});
}

render();
</script>
</body>
</html>
