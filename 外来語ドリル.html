.gd{
  --ink:#16243D; --ink2:#31405C; --paper:#FBFAF6; --paper2:#F1EEE4;
  --line:#DCD7C8; --stamp:#C0392B; --sea:#1F7A63; --amber:#B9791B; --muted:#6B7286;
  --disp:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
  --body:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif;
  font-family:var(--body); color:var(--ink); background:var(--paper);
  min-height:100%; padding-bottom:2rem; -webkit-font-smoothing:antialiased;
}
.gd *{box-sizing:border-box}
.gd button{font-family:inherit; cursor:pointer}
.gd button:focus-visible,.gd input:focus-visible{outline:2.5px solid var(--stamp); outline-offset:2px}
.boot{padding:4rem 1rem; text-align:center; color:var(--muted)}

.hd{display:flex; align-items:center; justify-content:space-between; gap:1rem;
  padding:.85rem 1.1rem; background:var(--ink); color:#F5F3EC; flex-wrap:wrap}
.hd-l{display:flex; align-items:center; gap:.7rem}
.hd-mark{display:grid; place-items:center; width:2.1rem; height:2.1rem; flex:0 0 auto;
  border:1.5px solid #F5F3EC; border-radius:3px; font-family:var(--disp); font-size:1.05rem}
.hd h1{margin:0; font-family:var(--disp); font-size:1.15rem; letter-spacing:.06em; font-weight:600}
.hd p{margin:.1rem 0 0; font-size:.68rem; color:#A9B4C8; letter-spacing:.02em}
.hd .link{color:#C6CEDD}

.wrap{max-width:44rem; margin:0 auto; padding:1.1rem}
.lead{font-family:var(--disp); font-size:1.15rem; margin:.4rem 0 1rem}
.ft{max-width:44rem; margin:1.5rem auto 0; padding:0 1.1rem; font-size:.7rem; color:var(--muted); text-align:center}

.panel{background:#fff; border:1px solid var(--line); border-radius:6px; padding:1rem 1.05rem; margin-bottom:1rem}
.panel.center{text-align:center}
.panel h3{margin:0 0 .6rem; font-size:.82rem; letter-spacing:.08em; color:var(--ink2); font-weight:700}
.panel h3.mt{margin-top:1.1rem}
.panel-hd{display:flex; align-items:center; gap:.6rem; margin-bottom:.7rem}
.panel-hd h2{margin:0; font-family:var(--disp); font-size:1rem; font-weight:600}

.seal{display:grid; place-items:center; width:2.6rem; height:2.6rem; border-radius:50%;
  color:#fff; font-family:var(--disp); font-size:1.15rem; flex:0 0 auto;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35)}
.seal.sm{width:1.9rem; height:1.9rem; font-size:.9rem}

.bar{height:9px; background:var(--paper2); border-radius:99px; overflow:hidden}
.bar-in{height:100%; background:var(--sea); border-radius:99px; transition:width .5s ease}
.barnote{margin:.5rem 0 0; font-size:.74rem; color:var(--muted)}

.kidgrid{display:grid; gap:.7rem; grid-template-columns:repeat(auto-fill,minmax(13rem,1fr))}
.kidcard{position:relative}
.kidbtn{width:100%; display:flex; align-items:center; gap:.75rem; text-align:left;
  background:#fff; border:1px solid var(--line); border-radius:6px; padding:.9rem; transition:.15s}
.kidbtn:hover{border-color:var(--ink); transform:translateY(-1px)}
.kidname{font-family:var(--disp); font-size:1.05rem; flex:1}
.kidgo{font-size:.7rem; color:var(--muted)}
.kiddel{position:absolute; top:.35rem; right:.4rem; background:none; border:0;
  font-size:.65rem; color:var(--muted); padding:.2rem .3rem}
.kiddel:hover{color:var(--stamp)}

.addbox{margin-top:1.4rem; border-top:1px dashed var(--line); padding-top:1rem}
.addbox label{font-size:.78rem; color:var(--ink2); font-weight:700}
.addrow{display:flex; gap:.5rem; margin-top:.45rem}
.gd input{flex:1; min-width:0; padding:.6rem .7rem; font-size:1rem; font-family:inherit;
  border:1px solid var(--line); border-radius:5px; background:#fff; color:var(--ink)}
.hint{font-size:.72rem; color:var(--muted); margin:.5rem 0 0}

.btn{background:var(--ink); color:#F7F5EF; border:0; border-radius:5px;
  padding:.6rem 1.1rem; font-size:.9rem; font-weight:600; transition:.15s}
.btn:hover{background:#0E1930}
.btn.big{width:100%; padding:.85rem; font-size:1rem; letter-spacing:.05em}
.btn.ghost{background:#fff; color:var(--ink); border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--ink); background:#fff}
.btn:disabled{opacity:.4; cursor:not-allowed}
.link{background:none; border:0; color:var(--ink2); font-size:.78rem; text-decoration:underline;
  text-underline-offset:3px; padding:.6rem .35rem; min-height:40px}
.link.danger{color:var(--stamp); display:block; margin:.6rem auto 0}
.link.quit{display:block; margin:1.2rem auto 0; color:var(--muted)}

.chips{display:grid; gap:.5rem; grid-template-columns:repeat(auto-fill,minmax(10.5rem,1fr))}
.chip{display:grid; gap:.15rem; text-align:left; background:var(--paper); border:1px solid var(--line);
  border-radius:5px; padding:.6rem .65rem; transition:.15s; position:relative}
.chip:hover{border-color:var(--ink2)}
.chip.on{background:var(--ink); border-color:var(--ink); color:#F7F5EF}
.chip-t{font-family:var(--disp); font-size:.95rem}
.chip-b{font-size:.66rem; opacity:.7; line-height:1.3}
.chip-n{position:absolute; top:.5rem; right:.6rem; font-size:.66rem; opacity:.75; font-variant-numeric:tabular-nums}
.quick{display:flex; gap:.8rem; margin-top:.6rem}

.radios{display:grid; gap:.4rem}
.radio{display:grid; grid-template-columns:auto 1fr; gap:.1rem .55rem; align-items:center;
  text-align:left; background:var(--paper); border:1px solid var(--line); border-radius:5px; padding:.55rem .7rem}
.radio:hover{border-color:var(--ink2)}
.radio .dot{grid-row:1/3; width:1rem; height:1rem; border-radius:50%; border:2px solid var(--line); background:#fff}
.radio.on{background:#fff; border-color:var(--ink)}
.radio.on .dot{border-color:var(--stamp); box-shadow:inset 0 0 0 3px var(--stamp)}
.rt{font-size:.88rem; font-weight:600}
.rn{font-size:.68rem; color:var(--muted)}

.counts{display:flex; gap:.4rem; flex-wrap:wrap}
.cbtn{background:var(--paper); border:1px solid var(--line); border-radius:5px;
  padding:.45rem .9rem; font-size:.85rem; font-variant-numeric:tabular-nums}
.cbtn.on{background:var(--ink); color:#F7F5EF; border-color:var(--ink)}
.actions{display:grid; gap:.55rem; margin-top:.4rem}
.warn{margin:0 0 .6rem; padding:.6rem .75rem; font-size:.78rem; line-height:1.6;
  color:#7A3B18; background:#FBF1E4; border:1px solid #E4C79B; border-radius:5px}

/* --- \u30AF\u30A4\u30BA --- */
.qbar{display:flex; justify-content:space-between; align-items:center; gap:.6rem;
  margin-bottom:.7rem; flex-wrap:wrap}
.qbar-r{font-size:.75rem; color:var(--muted); font-variant-numeric:tabular-nums}
.qbar-r b{color:var(--ink); font-size:.9rem}
.tag{font-size:.68rem; background:var(--ink); color:#F7F5EF; padding:.2rem .5rem; border-radius:3px;
  letter-spacing:.05em; margin-right:.35rem}
.tag.ghosttag{background:none; color:var(--ink2); border:1px solid var(--line)}

.card{position:relative; background:#fff; border:1px solid var(--line); border-left:4px solid var(--ink);
  border-radius:6px; padding:1.5rem 1.2rem; margin-bottom:.9rem; overflow:hidden;
  animation:rise .28s ease both}
.card.ok{border-left-color:var(--sea)}
.card.ng{border-left-color:var(--stamp)}
@keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
.qlabel{margin:0 0 .6rem; font-size:.73rem; color:var(--muted); letter-spacing:.06em}
.sentence{margin:0; font-family:var(--disp); font-size:1.25rem; line-height:2.1; letter-spacing:.02em}
.word{margin:0; font-family:var(--disp); font-size:1.9rem; letter-spacing:.06em; line-height:1.4}
.meaning{margin:0; font-family:var(--disp); font-size:1.3rem; line-height:1.85}
.blank{display:inline-block; min-width:5.5rem; text-align:center; border-bottom:2px solid var(--ink);
  margin:0 .15rem; padding:0 .25rem}
.blank.filled{border-bottom-color:var(--sea); color:var(--sea); font-weight:600}

.stamp{position:absolute; top:.7rem; right:.7rem; display:grid; place-items:center;
  width:3.4rem; height:3.4rem; border:3px double var(--stamp); border-radius:50%;
  color:var(--stamp); font-family:var(--disp); font-size:1rem; letter-spacing:.02em;
  transform:rotate(-14deg); animation:stampin .45s cubic-bezier(.2,1.4,.4,1) both; opacity:.9}
@keyframes stampin{from{transform:rotate(-14deg) scale(2.6); opacity:0} to{transform:rotate(-14deg) scale(1); opacity:.9}}

.opts{display:grid; gap:.5rem}
.opts.book{grid-template-columns:repeat(auto-fill,minmax(11rem,1fr)); gap:.4rem}
.opt{display:flex; align-items:center; gap:.6rem; text-align:left; background:#fff;
  border:1px solid var(--line); border-radius:5px; padding:.75rem .85rem; transition:.12s; width:100%}
.opt:hover:not(:disabled){border-color:var(--ink); transform:translateX(2px)}
.opts.book .opt{padding:.5rem .6rem}
.omark{display:grid; place-items:center; width:1.5rem; height:1.5rem; flex:0 0 auto;
  border:1px solid var(--line); border-radius:3px; font-size:.75rem; color:var(--ink2)}
.obody{display:grid; gap:.15rem; min-width:0}
.olabel{font-size:.95rem; line-height:1.5}
.osub{font-size:.75rem; color:var(--muted); line-height:1.5}
.opts.book .olabel{font-size:.83rem}
.opts.book .osub{font-size:.7rem}
.opt.right{border-color:var(--sea); background:#EFF6F3; box-shadow:inset 0 0 0 1px var(--sea)}
.opt.right .osub{color:#3E6A5C}
.opt.miss{border-color:var(--stamp); background:#FBEFEE}
.opt.dim{opacity:.75}
.opt:disabled{cursor:default}

.inputbox{margin-bottom:.9rem}
.inputbox input{width:100%; font-family:var(--disp); font-size:1.3rem; padding:.7rem .8rem; letter-spacing:.06em}
.inputact{display:flex; align-items:center; gap:.7rem; margin-top:.6rem; flex-wrap:wrap}
.hintout{font-size:.85rem; color:var(--amber); font-family:var(--disp)}

.qprog{margin-bottom:.85rem}
.qprog-n{margin:.35rem 0 0; font-size:.72rem; color:var(--muted); font-variant-numeric:tabular-nums}
.qprog-n b{color:var(--sea); font-size:.85rem}
.fbnext{margin:0 0 .5rem; font-size:.78rem; color:var(--ink2)}
.fb.done{border-color:var(--sea); background:#EBF4F0; box-shadow:inset 0 0 0 1px var(--sea)}
.fb.done .fbhead{color:var(--sea)}
.fb{border-radius:6px; padding:.9rem 1rem; margin-top:.3rem; border:1px solid var(--line); background:#fff}
.fb.ok{border-color:var(--sea); background:#F3F8F6}
.fb.ng{border-color:var(--stamp); background:#FDF3F2}
.fbhead{margin:0 0 .35rem; font-family:var(--disp); font-size:1.05rem}
.fb.ok .fbhead{color:var(--sea)}
.fb.ng .fbhead{color:var(--stamp)}
.fbans{margin:0 0 .3rem; font-size:.95rem}
.fbans b{font-family:var(--disp); font-size:1.15rem}
.fbsub{margin:0 0 .35rem; color:var(--ink2); font-size:.82rem; line-height:1.6}
.fbsrc{margin:0 0 .8rem; font-size:.7rem; color:var(--muted)}

.rlabel{margin:0; font-size:.8rem; color:var(--muted)}
.rbig{margin:.3rem 0 .2rem; font-family:var(--disp); font-size:2.4rem; font-variant-numeric:tabular-nums}
.rbig span{font-size:.95rem; color:var(--muted)}
.rrate{margin:0 0 .8rem; font-size:.82rem; color:var(--ink2)}

.misslist{list-style:none; margin:0; padding:0; display:grid; gap:.5rem}
.misslist li{display:grid; gap:.15rem; border-left:3px solid var(--stamp); padding:.35rem 0 .35rem .7rem}
.misslist b{font-family:var(--disp); font-size:1.05rem}
.misslist span{font-size:.8rem; color:var(--ink2); line-height:1.6}
.misslist em{font-style:normal; font-size:.76rem; color:var(--muted); line-height:1.6}

.perlv{list-style:none; margin:0; padding:0; display:grid; gap:.45rem}
.perlv li{display:grid; grid-template-columns:6rem 1fr 3.2rem; gap:.6rem; align-items:center}
.pl-t{font-size:.8rem}
.pl-bar{height:7px; background:var(--paper2); border-radius:99px; overflow:hidden}
.pl-bar i{display:block; height:100%; background:var(--sea)}
.pl-n{font-size:.72rem; color:var(--muted); text-align:right; font-variant-numeric:tabular-nums}

@media (max-width:520px){
  .sentence{font-size:1.1rem; line-height:2}
  .word{font-size:1.5rem}
  .meaning{font-size:1.1rem}
  .opts.book{grid-template-columns:1fr 1fr}
  .perlv li{grid-template-columns:5rem 1fr 3rem}
}
@media (prefers-reduced-motion:reduce){
  .gd *{animation:none !important; transition:none !important}
}
