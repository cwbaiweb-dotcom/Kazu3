<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>慣用句マスター｜四科のまとめ</title>
<style>
  :root{
    --paper:#FAF6EC;
    --card:#FFFDF6;
    --ink:#33404E;
    --ink-light:#7A8494;
    --shu:#C73E3A;      /* 朱色 */
    --shu-soft:#F6E3DE;
    --midori:#3E7C59;   /* 正解の緑 */
    --midori-soft:#E2EFE5;
    --line:#E6DEC9;
    --gold:#B7923F;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--paper);
    background-image:radial-gradient(rgba(199,62,58,.035) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 48px}
  .mincho{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif}

  /* ---------- header ---------- */
  header{display:flex;align-items:center;gap:12px;padding:10px 2px 18px}
  .hanko{
    width:46px;height:46px;border-radius:8px;background:var(--shu);color:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    font-size:20px;line-height:1.1;text-align:center;box-shadow:0 2px 0 rgba(0,0,0,.12);
    writing-mode:vertical-rl;
  }
  header h1{font-size:21px;letter-spacing:.12em}
  header .sub{font-size:11px;color:var(--ink-light);letter-spacing:.18em;margin-top:3px}

  .screen{display:none}
  .screen.active{display:block;animation:fadein .25s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(70,50,20,.05)}
  .label{font-size:12px;color:var(--shu);letter-spacing:.25em;margin-bottom:10px;font-weight:700}

  /* ---------- home ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    border:1.5px solid var(--line);background:#fff;border-radius:999px;
    padding:9px 16px;font-size:14px;cursor:pointer;color:var(--ink);
    transition:all .15s;
  }
  .chip.on{border-color:var(--shu);background:var(--shu);color:#fff;font-weight:700}
  .chip.add{border-style:dashed;color:var(--ink-light)}
  .countrow{display:flex;gap:8px}
  .countrow .chip{flex:1;text-align:center}
  .startbtns{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .btn{
    display:block;width:100%;border:none;border-radius:12px;padding:16px;
    font-size:16px;font-weight:700;letter-spacing:.1em;cursor:pointer;
    font-family:inherit;transition:transform .1s;
  }
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--ink);color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.18)}
  .btn.shu{background:var(--shu);color:#fff;box-shadow:0 3px 0 rgba(0,0,0,.15)}
  .btn.ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
  .note{font-size:12px;color:var(--ink-light);line-height:1.7;margin-top:8px}
  .statline{font-size:13px;color:var(--ink-light);margin-top:10px;line-height:1.8}
  .statline b{color:var(--midori)}
  .statline .bad{color:var(--shu)}

  /* ---------- quiz ---------- */
  .qbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:13px;color:var(--ink-light)}
  .qbar .quit{color:var(--ink-light);text-decoration:underline;cursor:pointer;background:none;border:none;font-size:13px;font-family:inherit}
  .progress{height:6px;background:#EDE6D4;border-radius:99px;overflow:hidden;margin-bottom:18px}
  .progress i{display:block;height:100%;background:var(--shu);border-radius:99px;transition:width .3s}
  .meaning{
    background:var(--shu-soft);border-radius:10px;padding:12px 14px;
    font-size:14px;line-height:1.8;margin-bottom:18px;
  }
  .meaning::before{content:"意味";display:inline-block;background:var(--shu);color:#fff;font-size:10px;padding:2px 8px;border-radius:99px;margin-right:8px;letter-spacing:.2em;vertical-align:2px}
  .idiom{
    text-align:center;font-size:30px;letter-spacing:.06em;line-height:1.6;
    padding:6px 0 22px;font-weight:600;
  }
  .blank{
    display:inline-block;min-width:1.35em;border:2.5px solid var(--shu);
    border-radius:6px;color:var(--shu);background:#fff;
    padding:0 .12em;margin:0 .06em;text-align:center;
  }
  .blank.empty::after{content:"？";opacity:.45;font-size:.8em}
  .blank.ok{border-color:var(--midori);color:var(--midori);background:var(--midori-soft)}
  .blank.ng{border-color:var(--shu);color:var(--shu);background:var(--shu-soft)}
  .opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .opt{
    border:1.5px solid var(--line);background:#fff;border-radius:12px;
    padding:16px 8px;font-size:20px;font-weight:600;cursor:pointer;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;letter-spacing:.1em;
    color:var(--ink);transition:all .12s;position:relative;
  }
  .opt:not(:disabled):active{transform:scale(.97)}
  .opt:disabled{cursor:default;opacity:.45}
  .opt.right{border-color:var(--midori);background:var(--midori-soft);color:var(--midori);opacity:1}
  .opt.wrong{border-color:var(--shu);background:var(--shu-soft);color:var(--shu);opacity:1}
  .opt.right::after{content:"○";position:absolute;top:2px;right:8px;font-size:14px}
  .opt.wrong::after{content:"×";position:absolute;top:2px;right:8px;font-size:14px}
  .judge{
    text-align:center;height:64px;display:flex;align-items:center;justify-content:center;
    gap:10px;margin-top:6px;
  }
  .maru{
    width:44px;height:44px;border:4px solid var(--midori);border-radius:50%;
    animation:stamp .25s ease;
  }
  .batsu{font-size:44px;color:var(--shu);line-height:1;animation:stamp .25s ease}
  @keyframes stamp{from{transform:scale(1.6);opacity:0}to{transform:scale(1);opacity:1}}
  .judge .msg{font-size:14px;color:var(--ink-light);text-align:left;line-height:1.6}
  .judge .msg b{color:var(--ink);font-size:16px}
  .nextbtn{margin-top:6px}

  /* ---------- result ---------- */
  .score{text-align:center;padding:10px 0 4px}
  .score .big{font-size:56px;font-weight:700;color:var(--shu)}
  .score .big small{font-size:22px;color:var(--ink-light);font-weight:600}
  .score .word{font-size:15px;letter-spacing:.3em;margin-top:2px}
  .misslist{margin-top:6px}
  .miss{border-top:1px dashed var(--line);padding:12px 2px;font-size:14px;line-height:1.7}
  .miss:first-child{border-top:none}
  .miss .id{font-size:17px;font-weight:700;letter-spacing:.05em}
  .miss .id em{font-style:normal;color:var(--shu)}
  .miss .mn{color:var(--ink-light);font-size:13px}
  .perfect{text-align:center;color:var(--midori);font-size:15px;padding:14px 0;letter-spacing:.1em}

  /* ---------- list ---------- */
  .cat-h{font-size:14px;letter-spacing:.2em;color:#fff;background:var(--ink);display:inline-block;padding:4px 14px;border-radius:99px;margin:14px 0 10px}
  .li{display:flex;gap:10px;align-items:baseline;border-bottom:1px dashed var(--line);padding:10px 2px;font-size:14px;line-height:1.7}
  .li .mark{flex-shrink:0;width:20px;text-align:center;font-weight:700}
  .li .mark.m2{color:var(--midori)}
  .li .mark.mx{color:var(--shu)}
  .li .mark.m0{color:#C9C2B0}
  .li .id{font-weight:700;font-size:16px;letter-spacing:.04em;flex-shrink:0}
  .li .id em{font-style:normal;color:var(--shu)}
  .li .mn{color:var(--ink-light);font-size:13px}
  .backrow{position:sticky;bottom:0;padding:10px 0;background:linear-gradient(transparent,var(--paper) 40%)}
  .legend{font-size:12px;color:var(--ink-light);margin:6px 0 2px;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="hanko mincho">慣用句</div>
    <div>
      <h1 class="mincho">慣用句マスター</h1>
      <div class="sub">四科のまとめ・語句の知識</div>
    </div>
  </header>

  <!-- ============ HOME ============ -->
  <section id="home" class="screen active">
    <div class="card">
      <div class="label">だれが挑戦する？</div>
      <div class="chips" id="userChips"></div>
      <div class="statline" id="userStat"></div>
    </div>

    <div class="card">
      <div class="label">出題する種類</div>
      <div class="chips" id="catChips"></div>
    </div>

    <div class="card">
      <div class="label">問題数</div>
      <div class="countrow" id="countChips"></div>
    </div>

    <div class="startbtns">
      <button class="btn shu" onclick="startQuiz(false)">クイズをはじめる</button>
      <button class="btn primary" onclick="startQuiz(true)">苦手だけ復習する</button>
      <button class="btn ghost" onclick="showList()">慣用句一覧をみる</button>
    </div>
    <p class="note">意味をヒントに、□に入る言葉を選ぼう。まちがえた問題は自動で記録されて、次回に出やすくなるよ。2回連続で正解すると「マスター◎」！</p>
  </section>

  <!-- ============ QUIZ ============ -->
  <section id="quiz" class="screen">
    <div class="qbar">
      <span id="qnum"></span>
      <button class="quit" onclick="goHome()">やめる</button>
    </div>
    <div class="progress"><i id="pbar" style="width:0%"></i></div>
    <div class="card">
      <div class="meaning" id="qMeaning"></div>
      <div class="idiom mincho" id="qIdiom"></div>
      <div class="opts" id="qOpts"></div>
      <div class="judge" id="qJudge"></div>
      <button class="btn primary nextbtn" id="nextBtn" style="visibility:hidden" onclick="nextQ()">次へ</button>
    </div>
  </section>

  <!-- ============ RESULT ============ -->
  <section id="result" class="screen">
    <div class="card">
      <div class="score">
        <div class="big" id="scoreNum"></div>
        <div class="word mincho" id="scoreWord"></div>
      </div>
    </div>
    <div class="card" id="missCard">
      <div class="label">まちがえた問題</div>
      <div class="misslist" id="missList"></div>
    </div>
    <div class="startbtns">
      <button class="btn shu" id="retryMissBtn" onclick="retryMiss()">まちがいだけ、もう一回</button>
      <button class="btn primary" onclick="startQuiz(false)">もう一度挑戦</button>
      <button class="btn ghost" onclick="goHome()">ホームへもどる</button>
    </div>
  </section>

  <!-- ============ LIST ============ -->
  <section id="list" class="screen">
    <div class="card">
      <div class="label">慣用句一覧</div>
      <p class="legend">◎＝マスター（2回連続正解）　×＝苦手（要復習）　・＝未挑戦/挑戦中</p>
      <div id="listBody"></div>
    </div>
    <div class="backrow"><button class="btn ghost" onclick="goHome()">ホームへもどる</button></div>
  </section>
</div>

const CATS=["身体","動物・植物","そのほか"];
const KEY="kanyoku_quiz_v1";

/* 同じ問題文で別解になる語を自動で除外する表 */
const altMap={};
DATA.forEach(d=>{const k=d[0]+"|"+d[1];(altMap[k]=altMap[k]||new Set()).add(d[2]);});

/* 分類ごとの選択肢プール */
const pools=[new Set(),new Set(),new Set()];
DATA.forEach(d=>pools[d[0]].add(d[2]));

/* ---------------- 保存 ---------------- */
let store={users:{},current:null};
try{const s=localStorage.getItem(KEY);if(s)store=JSON.parse(s);}catch(e){}
function save(){try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){}}
function user(){
  if(!store.current||!store.users[store.current]){
    const names=Object.keys(store.users);
    if(!names.length){store.users["ゲスト"]={};store.current="ゲスト";}
    else store.current=names[0];
  }
  return store.users[store.current];
}
function stat(i){const u=user();return u[i]||(u[i]={s:0,w:0,n:0});} /* s=連続正解 w=誤答数 n=挑戦数 */

/* ---------------- ホーム ---------------- */
let selCats=[true,true,true];
let selCount=10;

function renderHome(){
  user();
  const uc=document.getElementById("userChips");
  uc.innerHTML="";
  Object.keys(store.users).forEach(n=>{
    const b=document.createElement("button");
    b.className="chip"+(n===store.current?" on":"");
    b.textContent=n;
    b.onclick=()=>{store.current=n;save();renderHome();};
    uc.appendChild(b);
  });
  const add=document.createElement("button");
  add.className="chip add";add.textContent="＋追加";
  add.onclick=()=>{
    const n=prompt("なまえを入力してね");
    if(n&&n.trim()){store.users[n.trim()]=store.users[n.trim()]||{};store.current=n.trim();save();renderHome();}
  };
  uc.appendChild(add);

  const u=user();let mastered=0,weak=0,tried=0;
  DATA.forEach((d,i)=>{const s=u[i];if(!s)return;if(s.n)tried++;if(s.s>=2)mastered++;else if(s.w>0)weak++;});
  document.getElementById("userStat").innerHTML=
    `全${DATA.length}問中：マスター◎ <b>${mastered}</b>問　／　苦手 <span class="bad">${weak}</span>問　／　挑戦済み ${tried}問`;

  const cc=document.getElementById("catChips");
  cc.innerHTML="";
  CATS.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="chip"+(selCats[i]?" on":"");
    b.textContent=c;
    b.onclick=()=>{selCats[i]=!selCats[i];if(!selCats.some(x=>x))selCats[i]=true;renderHome();};
    cc.appendChild(b);
  });

  const qc=document.getElementById("countChips");
  qc.innerHTML="";
  [10,20,30,"全問"].forEach(n=>{
    const b=document.createElement("button");
    const v=(n==="全問")?9999:n;
    b.className="chip"+(selCount===v?" on":"");
    b.textContent=(n==="全問")?"全問":n+"問";
    b.onclick=()=>{selCount=v;renderHome();};
    qc.appendChild(b);
  });
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}
function goHome(){renderHome();show("home");}

/* ---------------- 出題 ---------------- */
let queue=[],qi=0,correct=0,missed=[];

function buildPool(weakOnly){
  const u=user();
  let pool=DATA.map((d,i)=>i).filter(i=>selCats[DATA[i][0]]);
  if(weakOnly){
    pool=pool.filter(i=>{const s=u[i];return s&&s.w>0&&s.s<2;});
  }
  return pool;
}
function startQuiz(weakOnly){
  const pool=buildPool(weakOnly);
  if(!pool.length){
    alert(weakOnly?"苦手な問題はありません。すばらしい！\nまずは通常クイズに挑戦してね。":"出題できる問題がありません。");
    return;
  }
  const u=user();
  /* 苦手・未マスターを優先しつつシャッフル */
  const scored=pool.map(i=>{
    const s=u[i]||{s:0,w:0,n:0};
    let sc=Math.random()*3+s.w*3+(s.n===0?1.5:0);
    if(s.s>=2)sc-=5;
    return[i,sc];
  }).sort((a,b)=>b[1]-a[1]);
  queue=scored.slice(0,Math.min(selCount,scored.length)).map(x=>x[0]);
  shuffle(queue);
  qi=0;correct=0;missed=[];
  show("quiz");renderQ();
}
function retryMiss(){
  if(!missed.length){goHome();return;}
  queue=missed.slice();shuffle(queue);
  qi=0;correct=0;missed=[];
  show("quiz");renderQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function makeOptions(idx){
  const d=DATA[idx];
  const banned=new Set(altMap[d[0]+"|"+d[1]]);      /* 同じ問題文の別解 */
  (d[4]||[]).forEach(x=>banned.add(x));             /* 個別の除外語 */
  banned.add(d[2]);
  const cand=[...pools[d[0]]].filter(w=>!banned.has(w));
  shuffle(cand);
  const opts=[d[2],...cand.slice(0,3)];
  shuffle(opts);
  return opts;
}

function renderQ(){
  const idx=queue[qi],d=DATA[idx];
  document.getElementById("qnum").textContent=`第 ${qi+1} 問 ／ ${queue.length} 問`;
  document.getElementById("pbar").style.width=(qi/queue.length*100)+"%";
  document.getElementById("qMeaning").textContent=d[3];
  document.getElementById("qIdiom").innerHTML=d[1].replace("□",'<span class="blank empty" id="blk"></span>');
  const box=document.getElementById("qOpts");
  box.innerHTML="";
  makeOptions(idx).forEach(w=>{
    const b=document.createElement("button");
    b.className="opt";b.textContent=w;
    b.onclick=()=>answer(idx,w,b);
    box.appendChild(b);
  });
  document.getElementById("qJudge").innerHTML="";
  document.getElementById("nextBtn").style.visibility="hidden";
}

function answer(idx,w,btn){
  const d=DATA[idx],ok=(w===d[2]),s=stat(idx);
  s.n++;
  if(ok){s.s++;correct++;}else{s.s=0;s.w++;missed.push(idx);}
  save();
  document.querySelectorAll(".opt").forEach(b=>{
    b.disabled=true;
    if(b.textContent===d[2])b.classList.add("right");
  });
  if(!ok)btn.classList.add("wrong");
  const blk=document.getElementById("blk");
  blk.classList.remove("empty");
  blk.textContent=d[2];
  blk.classList.add(ok?"ok":"ng");
  const j=document.getElementById("qJudge");
  if(ok){
    const m=(s.s>=2)?"マスター◎達成！":"正解！";
    j.innerHTML=`<div class="maru"></div><div class="msg"><b>${m}</b></div>`;
  }else{
    j.innerHTML=`<div class="batsu">×</div><div class="msg">正解は「<b>${d[1].replace("□",d[2])}</b>」</div>`;
  }
  const nb=document.getElementById("nextBtn");
  nb.textContent=(qi===queue.length-1)?"結果をみる":"次へ";
  nb.style.visibility="visible";
}

function nextQ(){
  qi++;
  if(qi<queue.length){renderQ();}
  else renderResult();
}

function renderResult(){
  document.getElementById("pbar").style.width="100%";
  const n=queue.length;
  document.getElementById("scoreNum").innerHTML=`${correct}<small>／${n}問</small>`;
  const rate=correct/n;
  document.getElementById("scoreWord").textContent=
    rate===1?"満点！お見事！":rate>=0.8?"あと少しで満点！":rate>=0.5?"いい調子！":"復習して再挑戦だ！";
  const mc=document.getElementById("missCard"),ml=document.getElementById("missList");
  const rb=document.getElementById("retryMissBtn");
  if(missed.length){
    mc.style.display="block";rb.style.display="block";
    ml.innerHTML=missed.map(i=>{
      const d=DATA[i];
      return `<div class="miss"><div class="id mincho">${d[1].replace("□","<em>"+d[2]+"</em>")}</div><div class="mn">${d[3]}</div></div>`;
    }).join("");
  }else{
    mc.style.display="none";rb.style.display="none";
  }
  show("result");
}

/* ---------------- 一覧 ---------------- */
function showList(){
  const u=user();
  let html="";
  CATS.forEach((c,ci)=>{
    html+=`<div class="cat-h">${c}</div>`;
    DATA.forEach((d,i)=>{
      if(d[0]!==ci)return;
      const s=u[i];
      let mk="・",cls="m0";
      if(s&&s.s>=2){mk="◎";cls="m2";}
      else if(s&&s.w>0){mk="×";cls="mx";}
      html+=`<div class="li"><span class="mark ${cls}">${mk}</span><span class="id mincho">${d[1].replace("□","<em>"+d[2]+"</em>")}</span><span class="mn">${d[3]}</span></div>`;
    });
  });
  document.getElementById("listBody").innerHTML=html;
  show("list");
}

renderHome();
